</div>
<div id="spotLinkPopup">
  <button class="slClose" onclick="closeSlPopup()">✕</button>
  <div class="slCoords" id="slCoords">Col: – &nbsp;Row: –</div>
  <div class="slZoomRow">
    <button class="slzBtn" data-z="0.5" onclick="setSlZoom(this)">½×</button>
    <button class="slzBtn" data-z="1" onclick="setSlZoom(this)">1×</button>
    <button class="slzBtn" data-z="2" onclick="setSlZoom(this)">2×</button>
    <button class="slzBtn" data-z="3" onclick="setSlZoom(this)">3×</button>
  </div>
  <button class="slCopy" onclick="copySlLink()">📋 ლინკის კოპირება</button>
</div>
<div class="info">${w}\u00d7${h} \u00b7 ${COLS}\u00d7${ROWS}</div>
<script>
const _CFG=JSON.parse(${cfgJSLiteral});
${useCanvasRenderer ? `
// ── Coord-tile canvas renderer ──
(function(){
  const cfg=_CFG, TS=${TS}, COLS=cfg.cols, ROWS=cfg.rows;
  const canvas=document.getElementById('mapImg');
  if(!canvas)return;
  const ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=false;
  const tileMap=new Map();
  (cfg.custom||[]).forEach(t=>tileMap.set(t.id,t));
  (cfg.autoTiles||[]).forEach(t=>tileMap.set(t.id,t));
  (cfg.dualTiles||[]).forEach(t=>tileMap.set(t.id,t));
  const sheets=new Map();   // sheetUrl → Image
  const b64imgs=new Map();  // tile.id → Image
  const urls=new Set();
  [...(cfg.custom||[]),...(cfg.autoTiles||[]),...(cfg.dualTiles||[])].forEach(t=>{
    if(t.sheetUrl) urls.add(t.sheetUrl);
  });
  // also load sheetUrls needed by objects
  (cfg.objects||[]).forEach(obj=>{
    const def=tileMap.get(obj.id);
    if(def&&def.sheetUrl) urls.add(def.sheetUrl);
  });
  const b64tiles=(cfg.custom||[]).filter(t=>t.src&&!t.sheetUrl);
  let loadPending=urls.size+b64tiles.length;
  function tryDone(){if(--loadPending<=0)onAllLoaded();}
  function onAllLoaded(){
    const omap=cfg.overlayMap||null;
    ctx.fillStyle='#111';ctx.fillRect(0,0,canvas.width,canvas.height);
    function renderLayer(lmap){
      for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
          const id=lmap[r][c]; if(!id)continue;
          const t=tileMap.get(id); if(!t||t.dualTile||t.autoTile)continue;
          if(t.sheetUrl){const sh=sheets.get(t.sheetUrl);if(sh)ctx.drawImage(sh,t.x,t.y,t.w,t.h,c*TS,r*TS,TS,TS);}
          else{const bi=b64imgs.get(t.id);if(bi)ctx.drawImage(bi,c*TS,r*TS,TS,TS);}
        }
      }
      (cfg.dualTiles||[]).forEach(dt=>{
        const compat=dt.compatibleWith||[];
        for(let r=0;r<ROWS-1;r++){
          for(let c=0;c<COLS-1;c++){
            const mask=
              (connects(lmap[r  ][c  ],dt.id,compat)?1:0)|
              (connects(lmap[r  ][c+1],dt.id,compat)?2:0)|
              (connects(lmap[r+1][c  ],dt.id,compat)?4:0)|
              (connects(lmap[r+1][c+1],dt.id,compat)?8:0);
            if(!mask)continue;
            drawSp(dt,(dt.sprites||[])[mask],(c+0.5)*TS,(r+0.5)*TS);
          }
        }
      });
      for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
          const id=lmap[r][c]; if(!id)continue;
          const t=tileMap.get(id); if(!t||!t.autoTile)continue;
          const compat=t.compatibleWith||[];
          let m=0;
          if(r>0      &&connects(lmap[r-1][c],id,compat))m|=1;
          if(c<COLS-1 &&connects(lmap[r][c+1],id,compat))m|=2;
          if(r<ROWS-1 &&connects(lmap[r+1][c],id,compat))m|=4;
          if(c>0      &&connects(lmap[r][c-1],id,compat))m|=8;
          const sprites=t.sprites||[];
          const sp=sprites[m]||sprites[0]||sprites.find(v=>v&&typeof v==='object'&&v.w>0)||sprites.find(Boolean);
          if(sp) drawSp(t,sp,c*TS,r*TS);
        }
      }
    }
    renderLayer(cfg.map);
    if(omap) renderLayer(omap);
    // Pass: objects on canvas
    (cfg.objects||[]).forEach(obj=>{
      const def=tileMap.get(obj.id);
      if(!def)return;
      if(def.sheetUrl){
        const sh=sheets.get(def.sheetUrl);
        if(sh) ctx.drawImage(sh,def.sx,def.sy,def.sw,def.sh,
          obj.x*TS,obj.y*TS,(obj.cols||1)*TS,(obj.rows||1)*TS);
      } else if(def.img){
        ctx.drawImage(def.img,obj.x*TS,obj.y*TS,(obj.cols||1)*TS,(obj.rows||1)*TS);
      }
    });
  }
  function connects(nid,id,compat){return nid===id||compat.includes(nid);}
  function drawSp(t,sp,ox,oy){
    if(!sp)return;
    if(typeof sp==='object'&&sp.x!=null){
      const sh=sheets.get(t.sheetUrl);
      if(sh) ctx.drawImage(sh,sp.x,sp.y,sp.w,sp.h,ox,oy,TS,TS);
    } else if(typeof sp==='string'){
      const bi=new Image(); bi.onload=()=>ctx.drawImage(bi,ox,oy,TS,TS); bi.src=sp;
    }
  }
  if(loadPending===0){onAllLoaded();return;}
  urls.forEach(url=>{
    const img=new Image();
    img.onload=()=>{sheets.set(url,img);tryDone();};
    img.onerror=()=>tryDone();
    img.src=url;
  });
  b64tiles.forEach(t=>{
    const img=new Image();
    img.onload=()=>{b64imgs.set(t.id,img);tryDone();};
    img.onerror=()=>tryDone();
    img.src=t.src;
  });
})();
` : ''}
document.getElementById('mapWrap').addEventListener('click',e=>{
  if(e.target.closest('#menuBtn')||e.target.closest('#questBtn')||e.target.closest('#gameMenu')||e.target.closest('#questPopup'))return;
  const hs=e.target.closest('.hotspot');
  if(hs&&!hs.classList.contains('no-interact')){
    closeHsPopup();closeAreaPopup();
    if(hs.classList.contains('hs-area')){
      const t=hs.dataset.title||'';
      const grp=hs.dataset.group||'';
      blinkAreasByGroupOrTitle(grp,t);
      if(t)openAreaPopup(t,hs.dataset.tooltip||'');
    } else {
      openHsPopup(hs,hs.dataset.title||'',hs.dataset.tooltip||'');
    }
    return;
  }
  if(!e.target.closest('#hsPopup')&&!e.target.closest('#areaPopup')){closeHsPopup();closeAreaPopup();}
});
// ── AREA BLINK + FIT ──
// ── HOTSPOT POPUP ──
let _hsScale=1;
function parseLinks(t){
  let o='',i=0;
  while(i<t.length){
    const s=t.indexOf('[[',i);
    if(s<0){o+=t.slice(i);break;}
    o+=t.slice(i,s);
    const e=t.indexOf(']]',s+2);
    if(e<0){o+=t.slice(s);break;}
    const inner=t.slice(s+2,e);
    const p=inner.indexOf('|');
    if(p<0){o+=inner;}
    else{
      const lbl=inner.slice(0,p);
      const url=inner.slice(p+1).trim();
      const safe=url.startsWith('http')||url.startsWith('//')||url.startsWith('/')?url:'#';
      o+='<a href="'+safe+'" target="_blank" style="color:#58a6ff;">'+lbl+'</a>';
    }
    i=e+2;
  }
  return o.replace(/\\n/g,'<br>');
}
function openHsPopup(el,title,rawText){
  const sp=el.querySelector('.hs-sprite');
  if(sp){sp.classList.remove('flash');void sp.offsetWidth;sp.classList.add('flash');}
  const popup=document.getElementById('hsPopup');
  document.getElementById('hsPopupTitle').textContent=title||'';
  const body=document.getElementById('hsPopupBody');
  body.innerHTML=parseLinks(rawText||'');
  const pw=Math.min(window.innerWidth*0.88,360);
  const left=(window.innerWidth-pw)/2;
  const top=Math.max(60,(window.innerHeight-200)/2);
  popup.style.cssText='display:block;left:'+left+'px;top:'+top+'px;max-width:'+pw+'px;';
  popup.classList.add('show');
  document.getElementById('mapWrap').style.overflow='hidden';
}
function closeHsPopup(){const p=document.getElementById('hsPopup');p.classList.remove('show');p.style.display='none';document.getElementById('mapWrap').style.overflow='auto';}
// scale hotspots with map
/* scaleHotspots removed: CSS transform handles scaling */
function toggleQuest(){
  let p=document.getElementById('questPopup');
  if(!p){
    p=document.createElement('div');p.id='questPopup';
    p.style.cssText='position:fixed;bottom:62px;left:14px;z-index:30;background:rgba(22,27,34,0.88);backdrop-filter:blur(12px);border:1px solid rgba(48,54,61,0.5);border-radius:10px;padding:12px 14px;max-width:min(88vw,420px);font:13px/1.6 sans-serif;color:rgba(200,210,220,0.9);white-space:pre-wrap;';
    p.textContent='(აღწერა არ არის — ლეგენდა ტაბში შეიყვანე)';
    document.body.appendChild(p);
  }
  p.style.display=p.style.display==='block'?'none':'block';
}
function toggleSection(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}
function toggleMenu(){
  const gm=document.getElementById('gameMenu');
  const open=gm.classList.toggle('open');
  document.getElementById('mapWrap').style.overflow=open?'hidden':'auto';
  if(open&&!window._cfgLoaded){window._cfgLoaded=true;buildMenu(_CFG);}
}
function buildItems(parent,items){
  (items||[]).forEach(item=>{
    const itObj=typeof item==='string'?{type:'text',emoji:'\u2022',label:item}:item;
    if(itObj.type==='progress'){
      const v=Math.max(0,Math.min(100,itObj.value||0));
      const color=v>60?'#4ade80':v>30?'#facc15':'#f87171';
      const row=document.createElement('div');row.className='gm-progress-row';
      const pfx=itObj.emoji?itObj.emoji+' ':'';
      row.innerHTML='<span class="gm-progress-label">'+pfx+itObj.label+'</span><div class="gm-bar"><div class="gm-bar-fill" style="width:'+v+'%;background:'+color+';"></div></div><span class="gm-bar-pct">'+v+'%</span>';
      parent.appendChild(row);
    } else {
      const d=document.createElement('div');d.className='gm-item';
      const bullet=itObj.emoji||'\u2022';
      d.innerHTML=bullet+' '+parseLinks(itObj.label||'');
      parent.appendChild(d);
    }
  });
}
function buildSubs(parent,children,depth){
  (children||[]).forEach(sub=>{
    if(depth<1){
      const sw=document.createElement('div');sw.className='gm-section';sw.style.marginTop='6px';
      const sh=document.createElement('div');sh.className='gm-section-hdr';sh.style.fontSize='13px';
      sh.innerHTML=\`<span>\${sub.icon||'📁'}</span><span>\${sub.title}</span><span class="arrow">▼</span>\`;
      sh.onclick=()=>toggleSection(sh);
      const sb=document.createElement('div');sb.className='gm-section-body';
      buildItems(sb,sub.items);buildSubs(sb,sub.children,depth+1);
      sw.appendChild(sh);sw.appendChild(sb);parent.appendChild(sw);
    } else {
      const s=document.createElement('div');s.className='gm-sub';
      const st=document.createElement('div');st.className='gm-sub-title';st.textContent=(sub.icon||'📁')+' '+sub.title;
      s.appendChild(st);buildItems(s,sub.items);parent.appendChild(s);
    }
  });
}
function buildMenu(cfg){
  const ct=document.getElementById('gmContent');ct.innerHTML='';
  if(cfg.title){const t=document.createElement('div');t.style.cssText='font:16px/1 sans-serif;color:rgba(230,237,243,0.9);text-align:center;padding:0 0 12px;font-weight:600;';t.textContent=cfg.title;ct.appendChild(t);}
  (cfg.menu||[]).forEach(sec=>{
    const wrap=document.createElement('div');wrap.className='gm-section';
    const hdr=document.createElement('div');hdr.className='gm-section-hdr';
    hdr.innerHTML=\`<span>\${sec.icon||'📁'}</span><span>\${sec.title}</span><span class="arrow">▼</span>\`;
    hdr.onclick=()=>toggleSection(hdr);
    const body=document.createElement('div');body.className='gm-section-body';
    buildItems(body,sec.items);buildSubs(body,sec.children,0);
    wrap.appendChild(hdr);wrap.appendChild(body);ct.appendChild(wrap);
  });
}
// ── ZOOM (wheel + pinch) ──
const MAP_TS=${TS},MAP_W=${w},MAP_H=${h};
const wrap=document.getElementById('mapWrap');
const inner=document.getElementById('mapInner');
const sizer=document.getElementById('sizer');
const img=wrap.querySelector('img')||wrap.querySelector('canvas');
let scale=1;
function applyScale(s,ox,oy){
  const prev=scale;
  scale=Math.max(0.2,Math.min(8,s));
  const ratio=scale/prev;
  wrap.scrollLeft=(wrap.scrollLeft+ox)*ratio-ox;
  wrap.scrollTop=(wrap.scrollTop+oy)*ratio-oy;
  inner.style.transform='scale('+scale+')';
  sizer.style.width=(${w}*scale)+'px';
  sizer.style.height=(${h}*scale)+'px';
}
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=wrap.getBoundingClientRect();
  applyScale(scale*(e.deltaY<0?1.12:0.89),e.clientX-rect.left,e.clientY-rect.top);
},{passive:false});
let p0=null,pDist=0,pScale=1;
wrap.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    wrap.style.touchAction='none';
    p0=e.touches[0];const p1=e.touches[1];
    pDist=Math.hypot(p1.clientX-p0.clientX,p1.clientY-p0.clientY);
    pScale=scale;e.preventDefault();
  }
},{passive:false});
wrap.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const a=e.touches[0],b=e.touches[1];
    const d=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
    const rect=wrap.getBoundingClientRect();
    applyScale(pScale*(d/pDist),(a.clientX+b.clientX)/2-rect.left,(a.clientY+b.clientY)/2-rect.top);
    e.preventDefault();
  }
},{passive:false});
wrap.addEventListener('touchend',e=>{
  if(e.touches.length<2){wrap.style.touchAction='pan-x pan-y';}
},{passive:true});
// ── SPOT LINK POPUP (long-tap on map) ──
let _slCell={col:0,row:0},_slZoom=1;
function _snapZoom(z){
  const snaps=[0.5,1,2,3];
  return snaps.reduce((a,b)=>Math.abs(b-z)<Math.abs(a-z)?b:a);
}
function openSlPopup(col,row,clientX,clientY){
  _slCell={col,row};
  _slZoom=_snapZoom(scale);
  document.getElementById('slCoords').textContent='Col: '+col+'   Row: '+row;
  document.querySelectorAll('.slzBtn').forEach(b=>b.classList.toggle('on',+b.dataset.z===_slZoom));
  const p=document.getElementById('spotLinkPopup');
  const pw=200,ph=130;
  let left=clientX+12,top=clientY-ph/2;
  left=Math.min(window.innerWidth-pw-8,Math.max(8,left));

(function(){

function _doBlink(els){
  if(!els.length)return;
  const TS=MAP_TS;
  const cells=new Set();
  els.forEach(el=>{
    const ox=+el.dataset.ox,oy=+el.dataset.oy,ow=+el.dataset.ow,oh=+el.dataset.oh;
    for(let r=0;r<Math.round(oh/TS);r++)
      for(let cc=0;cc<Math.round(ow/TS);cc++)
        cells.add((Math.round(oy/TS)+r)+','+(Math.round(ox/TS)+cc));
  });
  const edges=[];
  cells.forEach(key=>{
    const [r,cc]=key.split(',').map(Number);
    const px=cc*TS,py=r*TS;
    if(!cells.has(r+','+(cc-1))) edges.push([px,py,px,py+TS]);
    if(!cells.has(r+','+(cc+1))) edges.push([px+TS,py,px+TS,py+TS]);
    if(!cells.has((r-1)+','+cc))  edges.push([px,py,px+TS,py]);
    if(!cells.has((r+1)+','+cc))  edges.push([px,py+TS,px+TS,py+TS]);
  });
  if(!edges.length)return;
  const ov=document.createElement('canvas');
  ov.width=MAP_W;ov.height=MAP_H;
  ov.style.cssText='position:absolute;top:0;left:0;pointer-events:none;z-index:15;';
  inner.appendChild(ov);
  const ctx=ov.getContext('2d');
  ctx.lineWidth=2;ctx.lineCap='square';
  function draw(alpha){
    ctx.clearRect(0,0,ov.width,ov.height);
    if(alpha<=0)return;
    ctx.strokeStyle='rgba(255,220,80,'+alpha.toFixed(2)+')';
    ctx.beginPath();
    edges.forEach(([x1,y1,x2,y2])=>{ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);});
    ctx.stroke();
  }
  const PULSE_MS=550;
  let start=null,phase=0;
  function frame(ts){
    if(!start)start=ts;
    const t=Math.min((ts-start)/PULSE_MS,1);
    draw(phase%2===0?t:1-t);
    if(t<1){requestAnimationFrame(frame);}
    else{
      phase++;
      if(phase<6){start=null;requestAnimationFrame(frame);}
      else{
        let fo=1;
        (function fade(){fo-=0.08;if(fo>0){draw(fo*0.9);requestAnimationFrame(fade);}else{draw(0);ov.remove();}})();
      }
    }
  }
  requestAnimationFrame(frame);
}

function makeThumb(){
  // 64x64 thumbnail from offscreen — may fail if canvas tainted by coord tiles
  try{
    const th=document.createElement("canvas");th.width=64;th.height=64;
    const ctx=th.getContext("2d");ctx.imageSmoothingEnabled=false;
    ctx.drawImage(offscreen,0,0,64,64);
    return th.toDataURL("image/png");
  }catch(e){
    // coord tiles taint canvas — return solid color placeholder
    const th=document.createElement("canvas");th.width=64;th.height=64;
    th.getContext("2d").fillStyle="#1a2e1a";
    th.getContext("2d").fillRect(0,0,64,64);
    return th.toDataURL("image/png");
  }
}

let currentProjectName="";

function saveProject(){
  let name=document.getElementById("projNameInput").value.trim();
  if(!name){toast("⚠ სახელი შეიყვანე");return;}
  const projects=getProjects();
  const thumb=makeThumb();
  const data=getMapData();
  const now=new Date();
  const dateStr=now.toLocaleDateString("ka-GE",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
  const existing=projects.findIndex(p=>p.name===name);
  const proj={name,thumb,data,date:dateStr,cols:COLS,rows:ROWS};
  if(existing>=0){
    projects[existing]=proj;
  } else {
    projects.unshift(proj);
  }
  // limit 20 projects
  if(projects.length>20) projects.splice(20);
  setProjects(projects);
  currentProjectName=name;
  renderProjectList();
  toast("💾 '"+name+"' შენახულია");
  closeProjects();
}

function loadProject(name){
  const projects=getProjects();
  const proj=projects.find(p=>p.name===name);
  if(!proj)return;
  const d=proj.data;
  COLS=d.cols;ROWS=d.rows;map=d.map;
  overlayMap=d.overlayMap||Array.from({length:ROWS},()=>Array(COLS).fill(""));
  hist=[];
  customTiles=[];autoTiles=[];dualTiles=[];
  const customs=d.custom||[];
  const ats=d.autoTiles||[];
  const dts=d.dualTiles||[];
  let pending=customs.length+ats.length+dts.length;

  function done(){
    if(--pending<=0){
      rebuildTileMap();buildPalette();rebuildOff();centerView();
      objects=[];
      (d.objects||[]).forEach(o=>{
        const def=tileMap.get(o.id);
        if(!def)return;
        const img=def.img||getImg(o.id);
        if(img) objects.push({...o,img});
      });
      scheduleRender();
    }
  }
  if(pending===0){rebuildTileMap();buildPalette();rebuildOff();centerView();scheduleRender();}

  if(customs.length) customs.forEach(ct=>_loadCustomTile(ct,done));
  if(ats.length) _loadAutoTilesArr(ats,done);
  if(dts.length) _loadDualTiles(dts,done);

  currentProjectName=name;
  document.getElementById("projNameInput").value=name;
  // restore legend data
  if(d.legendDesc!=null) document.getElementById("legTabDesc").value=d.legendDesc||"";
  if(d.legendLabels) _legendLabels={...(d.legendLabels||{})};
  if(d.legendMenu){_menuSections=d.legendMenu||[];renderMenuBuilder();}
  if(d.hotAreas) hotAreas=d.hotAreas;
  if(d.spotBaseUrl!=null){spotBaseUrl=d.spotBaseUrl;const _sui=document.getElementById("spotBaseUrlInp");if(_sui)_sui.value=spotBaseUrl;}
  closeProjects();
  toast("📂 '"+name+"' გაიხსნა");
}

  toast("🗑 '"+name+"' წაიშალა");
