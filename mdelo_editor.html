<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>RPG Map Editor</title>
<style>
:root{
  --bg:#0d1117;--panel:#161b22;--panel2:#1c2230;--border:#30363d;
  --accent:#f0a500;--green:#4ade80;--red:#f85149;--blue:#58a6ff;
  --text:#e6edf3;--muted:#8b949e;
  --green-dim:#0a2010;--green-dark:#0a1e0a;--blue-dim:#0a1020;--accent-dim:#1a1200;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:monospace;}
body{display:flex;flex-direction:column;}

/* TOP BAR */
#topbar{
  height:50px;background:var(--panel);border-bottom:2px solid var(--accent);
  display:flex;align-items:center;gap:5px;padding:0 8px;flex-shrink:0;
  overflow-x:auto;overflow-y:hidden;
}
.ttl{font-size:11px;font-weight:bold;color:var(--accent);letter-spacing:1px;white-space:nowrap;text-shadow:0 0 10px rgba(240,165,0,.5);}
.sep{width:1px;height:28px;background:var(--border);flex-shrink:0;margin:0 2px;}
.tbtn{
  height:36px;min-width:42px;padding:0 9px;background:var(--bg);border:2px solid var(--border);
  color:var(--text);font-size:17px;display:flex;align-items:center;justify-content:center;
  gap:3px;white-space:nowrap;cursor:pointer;flex-shrink:0;border-radius:4px;
}
.tbtn.on,.tpill.on{border-color:var(--green);color:var(--green);background:var(--green-dim);}
.tbtn.blu{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.tbtn.warn,.mbtn.warn,.mbtn.no,.pbtn.del{border-color:var(--red);color:var(--red);}
.mbtn.ok,.pbtn.open{border-color:var(--green);color:var(--green);}

/* CANVAS */
#cw{flex:1;overflow:hidden;position:relative;background:#060a0e;touch-action:none;}
#bgCanvas,#mc{position:absolute;top:0;left:0;}
#bgCanvas{pointer-events:none;}
#mc{image-rendering:pixelated;image-rendering:crisp-edges;}
#hud{
  position:absolute;top:8px;right:8px;background:rgba(13,17,23,.85);
  border:1px solid var(--border);color:var(--muted);font-size:13px;
  padding:4px 8px;border-radius:4px;pointer-events:none;z-index:10;line-height:1.7;
}
#hud b{color:var(--accent);}

/* BG BAR */
#bgbar{
  display:none;background:var(--panel2);border-bottom:1px solid var(--blue);
  padding:6px 12px;gap:10px;align-items:center;flex-shrink:0;overflow-x:auto;
}
#bgbar.show{display:flex;}
#bgbar label{font-size:13px;color:var(--blue);white-space:nowrap;flex-shrink:0;}
#bgOp{width:110px;flex-shrink:0;accent-color:var(--blue);}
.bxbtn{
  height:30px;padding:0 10px;background:transparent;border:1px solid var(--border);
  color:var(--muted);font-size:13px;cursor:pointer;border-radius:4px;white-space:nowrap;
  font-family:monospace;flex-shrink:0;
}

/* BOTTOM PANEL */
#bp{background:var(--panel);border-top:2px solid var(--border);flex-shrink:0;}
#ph{
  height:34px;display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;cursor:pointer;border-bottom:1px solid var(--border);position:relative;
}
.hbar{width:38px;height:4px;background:var(--border);border-radius:2px;position:absolute;left:50%;transform:translateX(-50%);}
.stshow{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--green);}
#ptbtn{font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;}
#tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;height:34px;background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;font-family:monospace;border-bottom:2px solid transparent;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}

/* TILE PALETTE */
#tr{display:flex;overflow-x:auto;overflow-y:hidden;padding:8px 8px 10px;gap:8px;min-height:90px;}
.tchip{
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  flex-shrink:0;padding:6px;border:2px solid transparent;border-radius:6px;background:var(--panel2);position:relative;
}
.tchip.sel,.bchip.sel{border-color:var(--green);background:var(--green-dark);}
.tchip canvas{image-rendering:pixelated;border-radius:2px;width:40px;height:40px;}
.tchip .lb{font-size:10px;color:var(--muted);text-align:center;max-width:46px;line-height:1.1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.tchip.sel .lb,.bchip.sel .blb{color:var(--green);}
.xbtn{
  display:none;position:absolute;top:2px;right:2px;width:16px;height:16px;
  background:var(--red);color:white;font-size:9px;border-radius:50%;
  align-items:center;justify-content:center;cursor:pointer;border:none;font-family:monospace;
}
.tchip:hover .xbtn,.tchip:active .xbtn,
.bchip:hover .xbtn,.bchip:active .xbtn{display:flex;}
.upchip{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  width:56px;min-height:78px;border:2px dashed var(--border);border-radius:6px;
  color:var(--muted);font-size:22px;cursor:pointer;background:var(--panel2);flex-shrink:0;
}
.upchip:active{border-color:var(--accent);color:var(--accent);}
.upchip span{font-size:11px;color:var(--muted);}

/* TOOLS */
#tolrow{display:flex;padding:0 8px 7px;gap:6px;}
.tpill{
  flex:1;height:40px;background:var(--panel2);border:2px solid var(--border);
  color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;border-radius:6px;
}
#brow{display:flex;padding:0 8px 10px;gap:6px;}
.bdot{
  flex:1;height:36px;background:var(--panel2);border:2px solid var(--border);
  color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:6px;
}
.bdot.on,.szBtn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.mkbtn.on{border-color:var(--accent);background:var(--accent-dim);}

/* MODALS */
#modal,#objPropsModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);align-items:center;justify-content:center;}
#modal{z-index:200;}
#objPropsModal{z-index:250;}
#modal.show,#objPropsModal.show{display:flex;}
#mbox{background:var(--panel);border:2px solid var(--accent);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:12px;width:270px;}
#mbox p{font-size:14px;color:var(--text);}
#mprev{image-rendering:pixelated;border-radius:4px;border:1px solid var(--border);align-self:center;}
#tname{background:var(--bg);border:2px solid var(--border);color:var(--text);font-family:monospace;font-size:16px;padding:7px 10px;border-radius:4px;width:100%;}
#tname:focus{outline:none;border-color:var(--accent);}
.mrow{display:flex;gap:8px;}
.mbtn{flex:1;height:38px;background:var(--bg);border:2px solid var(--border);color:var(--text);font-size:15px;cursor:pointer;border-radius:4px;font-family:monospace;}
#objPropsBox,#areaPropsBox{background:var(--panel);border:2px solid var(--blue);border-radius:10px;padding:16px;width:min(92vw,340px);display:flex;flex-direction:column;gap:10px;}
#areaPropsModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:250;align-items:center;justify-content:center;}
#objPropsBox h3{font-size:13px;color:var(--blue);letter-spacing:1px;}
.marker-row{display:flex;gap:6px;align-items:center;}
.marker-row span{font-size:12px;color:var(--muted);flex-shrink:0;}
.mkbtn{width:36px;height:36px;border-radius:6px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:bold;}
#objTooltipInp{width:100%;min-height:70px;resize:vertical;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:12px;padding:7px 9px;border-radius:6px;font-family:sans-serif;line-height:1.6;}
#objTooltipInp:focus{outline:none;border-color:var(--blue);}

/* LEGEND OVERLAY */
#legendTabOverlay{display:none;position:fixed;inset:0;z-index:150;background:var(--panel);flex-direction:column;}
#legendTabOverlay.show{display:flex;}
#legendTabOverlay .leg-topbar{
  height:44px;display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;border-bottom:2px solid var(--accent);flex-shrink:0;
}
#legendTabOverlay .leg-topbar span{font-size:13px;color:var(--accent);font-weight:bold;letter-spacing:1px;}
#legendTabOverlay .leg-topbar button{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
#legScrollBody{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}

/* BUILDINGS */
#tabBuildings{display:none;padding:8px;flex-direction:column;}
#buildGrid{display:flex;overflow-x:auto;overflow-y:hidden;padding:6px 8px 8px;gap:6px;}
.bchip{
  display:flex;flex-direction:column;align-items:center;
  border:2px solid transparent;border-radius:6px;
  background:var(--panel2);cursor:pointer;position:relative;
  padding:0;overflow:hidden;flex-shrink:0;
}
.bchip canvas{image-rendering:pixelated;display:block;}
.bchip .blb{
  position:absolute;bottom:0;left:0;right:0;
  font-size:9px;color:#fff;text-align:center;
  background:rgba(0,0,0,0.65);padding:1px 2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;
}

/* TOAST */
#toast{
  position:fixed;bottom:30%;left:50%;transform:translateX(-50%);
  background:rgba(22,27,34,.95);border:1px solid var(--accent);color:var(--accent);
  font-size:14px;padding:8px 20px;border-radius:20px;pointer-events:none;
  opacity:0;transition:opacity .3s;z-index:400;white-space:nowrap;
}
#toast.show{opacity:1;}

/* LAYER POPUP */
#layerPopup{
  position:fixed;z-index:500;
  background:rgba(22,27,34,.97);border:1px solid var(--border);
  border-radius:10px;padding:6px;display:none;flex-direction:column;gap:4px;
  box-shadow:0 4px 20px rgba(0,0,0,.6);min-width:140px;
}
#layerPopup button{
  height:34px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-size:12px;cursor:pointer;padding:0 10px;text-align:left;
}
#layerPopup button.active{border-color:var(--accent);background:rgba(74,222,128,.12);color:var(--accent);}

/* PROJECT OVERLAY */
#projOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:flex-start;justify-content:center;padding-top:50px;}
#projOverlay.show{display:flex;}
#projBox{background:var(--panel);border:2px solid var(--accent);border-radius:10px;width:min(94vw,420px);max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
#projHeader{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#projHeader h2{font-size:14px;color:var(--accent);letter-spacing:1px;}
#projClose{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
#projNew{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
#projNameInput{flex:1;background:var(--bg);border:2px solid var(--border);color:var(--text);font-family:monospace;font-size:15px;padding:6px 10px;border-radius:4px;}
#projNameInput:focus{outline:none;border-color:var(--accent);}
#projSaveBtn{height:36px;padding:0 14px;background:var(--bg);border:2px solid var(--green);color:var(--green);font-size:14px;cursor:pointer;border-radius:4px;font-family:monospace;white-space:nowrap;}
#projList{flex:1;overflow-y:auto;padding:8px;}
.pitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;background:var(--panel2);}
.pthumb{image-rendering:pixelated;border-radius:3px;border:1px solid var(--border);flex-shrink:0;}
.pinfo{flex:1;overflow:hidden;}
.pname{font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pdate,.psize{font-size:11px;color:var(--muted);}
.pdate{margin-top:2px;}
.pbtn{height:30px;padding:0 10px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:13px;cursor:pointer;border-radius:4px;font-family:monospace;flex-shrink:0;}
#projEmpty{text-align:center;padding:30px;color:var(--muted);font-size:14px;line-height:2;}

/* SCROLLBARS */
#topbar::-webkit-scrollbar,#bgbar::-webkit-scrollbar,
#tr::-webkit-scrollbar,#buildGrid::-webkit-scrollbar{display:none;}
#legScrollBody::-webkit-scrollbar,#projList::-webkit-scrollbar{width:4px;}
#legScrollBody::-webkit-scrollbar-thumb,#projList::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* AREA CURSOR */
#areaCursor{display:none;position:absolute;pointer-events:none;z-index:20;border:2px dashed var(--blue);background:rgba(88,166,255,0.08);}

/* SPOT POPUP */
#spotPopup{
  display:none;position:fixed;z-index:350;
  background:rgba(22,27,34,0.97);border:1px solid var(--accent);border-radius:10px;
  padding:11px 13px;width:260px;flex-direction:column;gap:7px;
}
#spotPopup.show{display:flex;}
#spotPopup .spClose{position:absolute;top:7px;right:9px;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;line-height:1;}
#spotPopup .spCoords{font-size:13px;color:var(--text);font-weight:600;padding-right:16px;}
#spotPopup .spZoomRow{display:flex;gap:4px;}
.szBtn{flex:1;height:28px;background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:12px;border-radius:5px;cursor:pointer;font-family:monospace;}
#spotPopup .spUrlRow{display:flex;flex-direction:column;gap:3px;}
#spotPopup .spUrlLbl{font-size:10px;color:var(--muted);letter-spacing:0.5px;}
#spotPopup .spUrlInp{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:11px;padding:5px 7px;border-radius:5px;font-family:monospace;}
#spotPopup .spUrlInp:focus{outline:none;border-color:var(--accent);}
#spotPopup .spCopy{height:32px;background:var(--bg);border:2px solid var(--green);color:var(--green);font-size:12px;border-radius:5px;cursor:pointer;font-family:monospace;}
</style>
</head>

<script>
// ── NO BUILT-IN TILES — only user-provided tiles ──
const BUILTIN=[];
let customTiles=[];
let autoTiles=[];
let dualTiles=[]; // [{id, lb, dualTile:true, sprites:[src0..src15], imgs:[img0..img15]}]
// sprites indexed by 4-bit corner bitmask: TL=1, TR=2, BL=4, BR=8

// ── FALLBACK DRAW (unknown tile IDs — draws a dark placeholder) ──
function drawB(ctx,id,ox,oy,s){
  ctx.save();ctx.translate(ox,oy);ctx.imageSmoothingEnabled=false;
  ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,s,s);
  ctx.fillStyle="#2a2a4e";ctx.fillRect(1,1,s-2,1);ctx.fillRect(1,1,1,s-2);
  ctx.restore();
}

function getBitmask(col,row,id,m){
  m=m||map;
  const t=tileMap.get(id);
  const compat=t?.compatibleWith||[];
  function connects(nid){return nid===id||compat.includes(nid);}
  let bm=0;
  if(row>0      && connects(m[row-1][col])) bm|=1;
  if(col<COLS-1 && connects(m[row][col+1])) bm|=2;
  if(row<ROWS-1 && connects(m[row+1][col])) bm|=4;
  if(col>0      && connects(m[row][col-1])) bm|=8;
  return bm;
}
function drawTile(ctx,id,ox,oy,s,mask){
  const t=tileMap.get(id);
  if(!t){drawB(ctx,id,ox,oy,s);return;}
  // dual tile
  if(t.dualTile){
    const img=t.imgs[15]||t.imgs.find(Boolean);
    if(img){ctx.save();ctx.imageSmoothingEnabled=false;ctx.drawImage(img,ox,oy,s,s);ctx.restore();}
    else if(t.sheetImg){
      const sp=t.sprites&&(t.sprites[15]||t.sprites.find(Boolean));
      if(sp&&typeof sp==='object'){ctx.save();ctx.imageSmoothingEnabled=false;ctx.drawImage(t.sheetImg,sp.x,sp.y,sp.w,sp.h,ox,oy,s,s);ctx.restore();}
      else drawB(ctx,id,ox,oy,s);
    } else drawB(ctx,id,ox,oy,s);
    return;
  }
  // auto tile
  if(t.autoTile){
    const idx=(mask!==undefined)?mask:0;
    const img=t.imgs[idx];
    if(img){ctx.save();ctx.imageSmoothingEnabled=false;ctx.drawImage(img,ox,oy,s,s);ctx.restore();}
    else if(t.sheetImg&&t.sprites){
      const sp=t.sprites[idx];
      if(sp&&typeof sp==='object'&&sp.w>0&&sp.h>0){
        ctx.save();ctx.imageSmoothingEnabled=false;
        ctx.drawImage(t.sheetImg,sp.x,sp.y,sp.w,sp.h,ox,oy,s,s);
        ctx.restore();
      }
    }
    return;
  }
  // regular tile with sheetImg
  if(t.sheetImg){ctx.save();ctx.imageSmoothingEnabled=false;ctx.drawImage(t.sheetImg,t.sx,t.sy,t.sw,t.sh,ox,oy,s,s);ctx.restore();return;}
  // regular tile with img
  if(t.img){ctx.save();ctx.imageSmoothingEnabled=false;ctx.drawImage(t.img,ox,oy,s,s);ctx.restore();return;}
  drawB(ctx,id,ox,oy,s);
}
// O(1) lookup via tileMap — NEVER uses .find()
function getImg(id){
  const t=tileMap.get(id);
  if(!t) return null;
  if(t.img) return t.img;
  if(t.sheetImg){
    // return canvas directly — synchronous, no async Image() load needed
    const cv=document.createElement("canvas");
    cv.width=t.cols?t.cols*TS:t.sw||TS;
    cv.height=t.rows?t.rows*TS:t.sh||TS;
    cv.getContext("2d").drawImage(t.sheetImg,t.sx,t.sy,t.sw,t.sh,0,0,cv.width,cv.height);
    t.img=cv; // cache canvas — drawImage accepts canvas directly
    return cv;
  }
  return null;
}

// ── STATE ──
const TS=32;
let COLS=78,ROWS=50,zoom=0.75,showGrid=true;
let curTile="",curTool="draw",brushSz=1;
let baseTile=""; // tile used for erase
let hoverCell=null, selectedObj=null, dragObjStart=null, lockedPos=null;
let map=[],overlayMap=[],hist=[];
let activeLayer="base"; // "base" | "overlay"
let objects=[]; // [{id,lb,src,img,cols,rows,x,y,marker,hsTitle,hsTooltip,hsLinks}]
let lastC=null; // last painted cell (mouse drag dedup)
let hotAreas=[]; // [{id,x1,y1,x2,y2,marker,title,tooltip}] — area hotspots
let _editingObjIdx=-1;
let _editingObjMarker="";
let _pendingArea=null;   // {x1,y1} area drag start
let offscreen=null;
let viewX=0,viewY=0;
let panelOpen=true;
let bgImg=null,bgOp=0.5,bgVis=true;

const canvas=document.getElementById("mc");
const bgc=document.getElementById("bgCanvas");
const cw=document.getElementById("cw");

// ── CACHED CONTEXTS ──
const mainCtx=canvas.getContext("2d");
let offCtx=null; // set in rebuildOff

// ── RAF SCHEDULER ──
let _rafId=null;
function scheduleRender(){if(!_rafId)_rafId=requestAnimationFrame(()=>{_rafId=null;render();});}

// ── SHEET IMAGE CACHE (coord-based tiles) ──
const _sheetCache=new Map(); // url → Image
function _loadSheet(url,cb){
  if(_sheetCache.has(url)){cb(_sheetCache.get(url));return;}
  const sh=new Image();
  sh.onload=()=>{_sheetCache.set(url,sh);cb(sh);};
  sh.onerror=()=>cb(null);
  sh.src=url;
}

// ── TILE MAP (O(1) lookup) ──
const tileMap=new Map(); // id → tile object
function rebuildTileMap(){
  tileMap.clear();
  BUILTIN.forEach(t=>tileMap.set(t.id,t));
  customTiles.forEach(t=>tileMap.set(t.id,t));
  autoTiles.forEach(t=>tileMap.set(t.id,t));
  dualTiles.forEach(t=>tileMap.set(t.id,t));
}

// ── SELECTION ELEMENT TRACKING ──
let _prevTileChip=null, _prevBuildChip=null;

// ── STATIC BG LAYER ──
let bgLayerDirty=true;
function drawBgLayer(){
  if(!bgImg)return;
  bgc.width=COLS*TS; bgc.height=ROWS*TS;
  const bctx=bgc.getContext("2d");
  bctx.imageSmoothingEnabled=true; bctx.imageSmoothingQuality="high";
  bctx.drawImage(bgImg,0,0,COLS*TS,ROWS*TS);
  bgLayerDirty=false;
}

function drawCell(ctx,col,row){
  const id=map[row][col];
  if(!id){
    ctx.clearRect(col*TS,row*TS,TS,TS);
    ctx.fillStyle="#111";ctx.fillRect(col*TS,row*TS,TS,TS);
    return;
  }
  const _t=tileMap.get(id);
  // autotile with transparent sprites: draw base terrain first so transparency shows terrain
  if(_t?.autoTile&&_t.baseTileId){
    drawTile(ctx,_t.baseTileId,col*TS,row*TS,TS);
  }
  const mask=(_t?.autoTile)?getBitmask(col,row,id):undefined;
  drawTile(ctx,id,col*TS,row*TS,TS,mask);
}
function rebuildOff(){
  if(!offscreen){offscreen=document.createElement("canvas");}
  if(offscreen.width!==COLS*TS||offscreen.height!==ROWS*TS){
    offscreen.width=COLS*TS;offscreen.height=ROWS*TS;
  }
  offCtx=offscreen.getContext("2d");offCtx.imageSmoothingEnabled=false;
  offCtx.clearRect(0,0,offscreen.width,offscreen.height);
  offCtx.fillStyle="#111";offCtx.fillRect(0,0,offscreen.width,offscreen.height);

  // ── BASE LAYER ──
  // Pass 1: base non-auto, non-dual tiles
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const id=map[r][c];if(!id)continue;
    const t=tileMap.get(id);if(!t||t.autoTile||t.dualTile)continue;
    drawTile(offCtx,id,c*TS,r*TS,TS);
  }
  // Pass 2: base dual grid
  if(dualTiles.length>0) renderDualGrid(offCtx,map);
  // Pass 3: base autotiles
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const id=map[r][c];if(!id)continue;
    const t=tileMap.get(id);if(!t?.autoTile)continue;
    if(t.baseTileId)drawTile(offCtx,t.baseTileId,c*TS,r*TS,TS);
    drawTile(offCtx,id,c*TS,r*TS,TS,getBitmask(c,r,id,map));
  }

  // ── OVERLAY LAYER ──
  if(!overlayMap.length)return;
  // Pass 4: overlay non-auto, non-dual tiles
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const id=overlayMap[r]?.[c];if(!id)continue;
    const t=tileMap.get(id);if(!t||t.autoTile||t.dualTile)continue;
    drawTile(offCtx,id,c*TS,r*TS,TS);
  }
  // Pass 5: overlay dual grid
  if(dualTiles.length>0) renderDualGrid(offCtx,overlayMap);
  // Pass 6: overlay autotiles
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const id=overlayMap[r]?.[c];if(!id)continue;
    const t=tileMap.get(id);if(!t?.autoTile)continue;
    if(t.baseTileId)drawTile(offCtx,t.baseTileId,c*TS,r*TS,TS);
    drawTile(offCtx,id,c*TS,r*TS,TS,getBitmask(c,r,id,overlayMap));
  }
}

function render(){
  const W=cw.clientWidth,H=cw.clientHeight;
  if(canvas.width!==W||canvas.height!==H){
    canvas.width=W;canvas.height=H;
    canvas.style.width=W+"px";canvas.style.height=H+"px";
  }
  const ctx=mainCtx;
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,W,H);
  // 1) tiles + grid + dual grid overlay (same transform)
  ctx.save();ctx.translate(viewX,viewY);ctx.scale(zoom,zoom);
  ctx.drawImage(offscreen,0,0);
  if(showGrid&&zoom>=0.5){
    ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=0.5;
    ctx.beginPath();
    for(let c=0;c<=COLS;c++){ctx.moveTo(c*TS,0);ctx.lineTo(c*TS,ROWS*TS);}
    for(let r=0;r<=ROWS;r++){ctx.moveTo(0,r*TS);ctx.lineTo(COLS*TS,r*TS);}
    ctx.stroke();
  }
  ctx.restore();
  // 2) objects layer
  ctx.save();ctx.translate(viewX,viewY);ctx.scale(zoom,zoom);
  objects.forEach(obj=>{
    const src=getImg(obj.id)||obj.img;
    if(src){ctx.imageSmoothingEnabled=false;ctx.drawImage(src,obj.x*TS,obj.y*TS,obj.cols*TS,obj.rows*TS);}
  });
  // draw markers on objects
  objects.forEach(obj=>{
    if(!obj.marker)return;
    const cx=(obj.x+obj.cols/2)*TS;
    const cy=(obj.y+obj.rows/2)*TS;
    const fs=Math.max(12,Math.round(18/zoom));
    ctx.save();
    ctx.font="bold "+fs+"px sans-serif";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    const col=obj.marker==="!"?"#f0a500":obj.marker==="?"?"#e0e0e0":"#4ade80";
    // black outline for readability on any background
    ctx.strokeStyle="rgba(0,0,0,0.95)";
    ctx.lineWidth=fs*0.3;
    ctx.lineJoin="round";
    ctx.strokeText(obj.marker,cx,cy);
    ctx.fillStyle=col;
    ctx.fillText(obj.marker,cx,cy);
    ctx.restore();
  });
  if((curTool==="obj_place")&&(lockedPos||hoverCell)){
    const obj=getObjDef(curTile);
    if(obj&&obj.img){
      const refCell=lockedPos||hoverCell;
      const{x,y}=objAnchor(refCell.col,refCell.row,obj.cols,obj.rows);
      const ok=inB(x,y)&&inB(x+obj.cols-1,y+obj.rows-1);
      const tileImg=getImg(curTile);
      if(!tileImg)return;
      ctx.globalAlpha=0.65;ctx.imageSmoothingEnabled=false;
      ctx.drawImage(tileImg,x*TS,y*TS,obj.cols*TS,obj.rows*TS);
      ctx.globalAlpha=1;
      ctx.strokeStyle=ok?"#4ade80":"#f85149";ctx.lineWidth=1.5/zoom;
      ctx.strokeRect(x*TS,y*TS,obj.cols*TS,obj.rows*TS);
      const chCell=lockedPos||hoverCell;
      const cx=chCell.col*TS+TS/2,cy=chCell.row*TS+TS/2,cs=4/zoom;
      ctx.strokeStyle=lockedPos?"#f0a500":"rgba(255,255,255,0.8)";ctx.lineWidth=lockedPos?2/zoom:1/zoom;
      ctx.beginPath();ctx.moveTo(cx-cs,cy);ctx.lineTo(cx+cs,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-cs);ctx.lineTo(cx,cy+cs);ctx.stroke();
      if(lockedPos){
        ctx.fillStyle="#f0a500";ctx.font="bold "+(8/zoom)+"px monospace";
        ctx.fillText("tap ჩასასმელად",x*TS+2/zoom,y*TS-2/zoom);
      }
    }
  }
  if(curTool==="obj_move"&&selectedObj!==null&&objects[selectedObj]){
    const o=objects[selectedObj];
    ctx.strokeStyle="#f0a500";ctx.lineWidth=2/zoom;
    ctx.setLineDash([5/zoom,3/zoom]);
    ctx.strokeRect(o.x*TS,o.y*TS,o.cols*TS,o.rows*TS);
    ctx.setLineDash([]);
  }
  // 2b) area hotspots + pending area preview
  const previewArea=_pendingArea&&hoverCell?{x1:Math.min(_pendingArea.x1,hoverCell.col),y1:Math.min(_pendingArea.y1,hoverCell.row),x2:Math.max(_pendingArea.x1,hoverCell.col)+1,y2:Math.max(_pendingArea.y1,hoverCell.row)+1}:
    (touchState?._areaStart&&touchState?._areaEnd)?{x1:Math.min(touchState._areaStart.x1,touchState._areaEnd.col),y1:Math.min(touchState._areaStart.y1,touchState._areaEnd.row),x2:Math.max(touchState._areaStart.x1,touchState._areaEnd.col)+1,y2:Math.max(touchState._areaStart.y1,touchState._areaEnd.row)+1}:null;
  const allAreas=[...hotAreas,...(previewArea?[{...previewArea,_preview:true}]:[])];
  // draw groups first (union fill — no inner border)
  const drawnGroups=new Set();
  allAreas.filter(a=>a.groupId&&!a._preview).forEach(a=>{
    if(drawnGroups.has(a.groupId))return;
    drawnGroups.add(a.groupId);
    const members=hotAreas.filter(x=>x.groupId===a.groupId);
    ctx.beginPath();
    members.forEach(m=>ctx.rect(m.x1*TS,m.y1*TS,(m.x2-m.x1)*TS,(m.y2-m.y1)*TS));
    ctx.fillStyle="rgba(240,165,0,0.08)";ctx.fill();
    ctx.strokeStyle="#f0a500";ctx.lineWidth=1.5/zoom;
    ctx.setLineDash([6/zoom,4/zoom]);
    ctx.stroke();
    ctx.setLineDash([]);
    // label on first member
    if(a.label){
      const m0=members[0];const ax=m0.x1*TS,ay=m0.y1*TS,aw=(m0.x2-m0.x1)*TS,ah=(m0.y2-m0.y1)*TS;
      const fs=Math.max(8,11/zoom);
      ctx.font="bold "+fs+"px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle="#f0a500";ctx.strokeStyle="rgba(0,0,0,0.85)";ctx.lineWidth=2/zoom;
      ctx.strokeText(a.label,ax+aw/2,ay+ah/2);ctx.fillText(a.label,ax+aw/2,ay+ah/2);
      ctx.textAlign="left";ctx.textBaseline="alphabetic";
    }
  });
  // draw non-group areas
  allAreas.filter(a=>!a.groupId||a._preview).forEach(a=>{
    const ax=a.x1*TS,ay=a.y1*TS,aw=(a.x2-a.x1)*TS,ah=(a.y2-a.y1)*TS;
    const col=a._preview?"#facc15":"#58a6ff";
    ctx.strokeStyle=col;ctx.lineWidth=(a._preview?2:1.5)/zoom;
    ctx.setLineDash([6/zoom,4/zoom]);
    ctx.strokeRect(ax,ay,aw,ah);
    ctx.fillStyle=a._preview?"rgba(250,204,21,0.12)":"rgba(88,166,255,0.07)";
    ctx.fillRect(ax,ay,aw,ah);
    ctx.setLineDash([]);
    if(a.label&&!a._preview){
      const fs=Math.max(8,11/zoom);
      ctx.font="bold "+fs+"px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle=col;ctx.strokeStyle="rgba(0,0,0,0.85)";ctx.lineWidth=2/zoom;
      ctx.strokeText(a.label,ax+aw/2,ay+ah/2);ctx.fillText(a.label,ax+aw/2,ay+ah/2);
      ctx.textAlign="left";ctx.textBaseline="alphabetic";
    }
  });
  ctx.restore();
  // 3) satellite overlay — pre-scaled static layer
  if(bgImg&&bgVis&&bgOp>0){
    if(bgLayerDirty)drawBgLayer();
    ctx.save();ctx.globalAlpha=bgOp;
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(bgc,viewX,viewY,COLS*TS*zoom,ROWS*TS*zoom);
    ctx.restore();
  }
}

function toggleBgPanel(){

}
function loadBg(e){

  rd.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      bgImg=img;bgVis=true;bgLayerDirty=true;
      document.getElementById("bgvbtn").textContent="👁 on";
      toast("🛰 "+img.width+"×"+img.height+" — '🛰 ფონი' ღილაკით გახსენი");

function setBgOp(v){bgOp=v/100;document.getElementById("bgOpV").textContent=v+"%";scheduleRender();}
function toggleBgVis(){bgVis=!bgVis;document.getElementById("bgvbtn").textContent=bgVis?"👁 on":"👁 off";scheduleRender();}
function removeBg(){bgImg=null;bgLayerDirty=true;document.getElementById("bgbar").classList.remove("show");document.getElementById("bgToggleBtn").classList.remove("on");scheduleRender();toast("🛰 ფონი წაიშალა");}
function fitToBg(){
  if(!bgImg){toast("ჯერ ფონი ჩატვირთე");return;}
  const ratio=bgImg.width/bgImg.height;
  const newCols=Math.round(ROWS*ratio);
  if(!confirm("რუკა → "+newCols+"×"+ROWS+"?\n(სურათის პროპორცია)"))return;
  const nm=Array.from({length:ROWS},(_,r)=>Array.from({length:newCols},(_,c)=>c<COLS?map[r][c]:"water"));
  COLS=newCols;map=nm;hist=[];bgLayerDirty=true;
  rebuildOff();centerView();scheduleRender();toast("✓ "+COLS+"×"+ROWS);
}

// ── MAP ──
function toCell(px,py){return{col:Math.floor((px-viewX)/(TS*zoom)),row:Math.floor((py-viewY)/(TS*zoom))};}
function inB(c,r){return c>=0&&c<COLS&&r>=0&&r<ROWS;}
function getObjDef(id){const t=tileMap.get(id);return(t&&t.isObject)?t:null;}

function paintAt(col,row){
  if(!inB(col,row))return;
  const t=curTool==="erase"?"":curTile;
  const h=Math.floor(brushSz/2);
  const amap=getActiveMap();
  const changed=[];
  for(let dr=-h;dr<=h;dr++)for(let dc=-h;dc<=h;dc++){
    const r=row+dr,c=col+dc;
    if(inB(c,r)&&amap[r][c]!==t){amap[r][c]=t;changed.push([c,r]);}
  }
  if(!changed.length){scheduleRender();return;}
  rebuildOff();
  scheduleRender();
}
function floodFill(col,row){
  if(!inB(col,row))return;
  const amap=getActiveMap();
  const tg=amap[row][col],fl=curTile;if(tg===fl)return;
  const stk=[[col,row]];
  while(stk.length){const[c,r]=stk.pop();if(!inB(c,r)||amap[r][c]!==tg)continue;amap[r][c]=fl;stk.push([c+1,r],[c-1,r],[c,r+1],[c,r-1]);}
  rebuildOff();
  scheduleRender();
}
function setLayer(l){
  activeLayer=l;
  document.getElementById("lpBtn-base").className=l==="base"?"active":"";
  document.getElementById("lpBtn-overlay").className=l==="overlay"?"active":"";
  toast(l==="base"?"🌍 Base layer":"✨ Overlay layer");
}
function openLayerPopup(chipEl){
  const pop=document.getElementById("layerPopup");
  const r=chipEl.getBoundingClientRect();
  pop.style.display="flex";
  pop.style.left=Math.min(r.left,window.innerWidth-160)+"px";
  pop.style.top=(r.top-pop.offsetHeight-6)+"px";
  document.getElementById("lpBtn-base").className=activeLayer==="base"?"active":"";
  document.getElementById("lpBtn-overlay").className=activeLayer==="overlay"?"active":"";
  setTimeout(()=>document.addEventListener("touchstart",closeLayerPopupOutside,{once:true,passive:true}),100);
}
function closeLayerPopup(){document.getElementById("layerPopup").style.display="none";}
function closeLayerPopupOutside(e){if(!document.getElementById("layerPopup").contains(e.target))closeLayerPopup();}
function getActiveMap(){return activeLayer==="overlay"?overlayMap:map;}
function snapState(){return{map:map.map(r=>[...r]),overlayMap:overlayMap.map(r=>[...r]),objects:objects.map(o=>({...o}))};}

function pushH(){hist.push(snapState());if(hist.length>50)hist.shift();}
function undo(){
  if(!hist.length){toast("↩");return;}
  const s=hist.pop();map=s.map;overlayMap=s.overlayMap||map.map(r=>Array(COLS).fill(""));objects=s.objects||[];
  rebuildOff();scheduleRender();toast("↩ Undo");
}

// ── SPOT POPUP ──
let _spotCell={col:0,row:0};
let _spotZoom=1;
let spotBaseUrl="";
function showSpotPopup(col,row,clientX,clientY){

function closeSpotPopup(){

}
function setSpotZoom(btn){
  _spotZoom=+btn.dataset.z;
  document.querySelectorAll(".szBtn").forEach(b=>b.classList.toggle("on",b===btn));
}
function copySpotLink(){
  const hash="#spot="+_spotCell.col+","+_spotCell.row+","+_spotZoom;
  const base=spotBaseUrl||"";
  const full=base?base+hash:hash;
  const done=()=>toast("📋 დაკოპირდა!");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(full).then(done).catch(()=>{_copyFallback(full);done();});
  }else{_copyFallback(full);done();}

function _copyFallback(text){
  const ta=document.createElement("textarea");ta.value=text;
  ta.style.cssText="position:fixed;top:-9999px;left:-9999px;";
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta);
}

// ── TOUCH — tap=paint, drag=pan ──
const PAN_THRESH=10; // px before it becomes a pan
let touchState=null; // {sx,sy, vx,vy, moved, histPushed}
let pD0=null,pZ0=null,pMX=null,pMY=null,pVX=null,pVY=null;
function tp(t){const r=canvas.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top};}
function d2(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const p=tp(e.touches[0]);
    const _ltX=p.x,_ltY=p.y;
    const _ltTimer=setTimeout(()=>{
      if(touchState&&!touchState.moved){
        const{col,row}=toCell(_ltX,_ltY);
        if(inB(col,row)){
          touchState._suppressTap=true;
          showSpotPopup(col,row,_ltX,_ltY);
        }
      }
    },600);
    touchState={sx:p.x,sy:p.y,vx:viewX,vy:viewY,moved:false,histPushed:false,_longTimer:_ltTimer};
    // fill/pick: act immediately on touchstart
    const{col,row}=toCell(p.x,p.y);
    if(curTool==="pick"){if(inB(col,row)){selectTile(map[row][col]);setTool("draw");toast("💉 "+tileMap.get(map[row][col])?.lb);}touchState=null;return;}
    if(curTool==="fill"){pushH();floodFill(col,row);setTool("pick");touchState=null;return;}
    if(curTool==="area"){
      const idx=_areaAtCell(col,row);
      if(idx>=0){openAreaProps(idx);touchState=null;return;}
      touchState._areaStart={x1:col,y1:row};
      return;
    }
    if(curTool==="obj_place"||curTool==="obj_move"){hoverCell={col,row};scheduleRender();}
  } else if(e.touches.length===2){
    touchState=null;
    const a=tp(e.touches[0]),b=tp(e.touches[1]);
    pD0=d2(a,b);pZ0=zoom;pMX=(a.x+b.x)/2;pMY=(a.y+b.y)/2;pVX=viewX;pVY=viewY;
  }
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(e.touches.length===1&&touchState){
    const p=tp(e.touches[0]);
    const dx=p.x-touchState.sx, dy=p.y-touchState.sy;
    if(!touchState.moved&&Math.hypot(dx,dy)>PAN_THRESH){
      touchState.moved=true;
      if(touchState._longTimer){clearTimeout(touchState._longTimer);touchState._longTimer=null;}
    }
    const{col:tc,row:tr}=toCell(p.x,p.y);
    hoverCell={col:tc,row:tr};
    if(curTool==="obj_move"&&selectedObj!==null&&dragObjStart){
      if(touchState._longTimer){clearTimeout(touchState._longTimer);touchState._longTimer=null;}
      const dx2=tc-dragObjStart.col,dy2=tr-dragObjStart.row;
      const o=objects[selectedObj];
      const nx=dragObjStart.ox+dx2,ny=dragObjStart.oy+dy2;
      if(canPlace(nx,ny,o.cols,o.rows,selectedObj)){o.x=nx;o.y=ny;}
      scheduleRender();
    } else if(curTool==="obj_place"){
      // obj_place: only update preview, never pan
      scheduleRender();
    } else if(curTool==="area"&&touchState._areaStart){
      // area drag — show selection, no panning
      touchState.moved=true;
      touchState._areaEnd={col:tc,row:tr};
      const s=touchState._areaStart;
      const x1=Math.min(s.x1,tc),y1=Math.min(s.y1,tr);
      const x2=Math.max(s.x1,tc)+1,y2=Math.max(s.y1,tr)+1;
      const ac=document.getElementById("areaCursor");
      ac.style.cssText=`display:block;left:${x1*TS*zoom+viewX}px;top:${y1*TS*zoom+viewY}px;width:${(x2-x1)*TS*zoom}px;height:${(y2-y1)*TS*zoom}px;border:2px dashed #facc15;background:rgba(250,204,21,0.1);`;
      scheduleRender();
    } else if(touchState.moved){
      viewX=touchState.vx+dx; viewY=touchState.vy+dy;
      clamp(); scheduleRender();
    }
  } else if(e.touches.length===2&&pD0){
    const a=tp(e.touches[0]),b=tp(e.touches[1]);
    const newZoom=Math.max(.25,Math.min(6,Math.round(pZ0*(d2(a,b)/pD0)*4)/4));
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    // zoom centered on pinch midpoint + follow midpoint pan
    viewX=mx-(pMX-pVX)*(newZoom/pZ0)-(mx-pMX);
    viewY=my-(pMY-pVY)*(newZoom/pZ0)-(my-pMY);
    zoom=newZoom;
    clamp(); scheduleRender();
  }
},{passive:false});

canvas.addEventListener("touchend",e=>{
  e.preventDefault();
  if(e.touches.length===0&&touchState){
    if(touchState._longTimer){clearTimeout(touchState._longTimer);touchState._longTimer=null;}
    if(touchState._suppressTap){touchState=null;if(e.touches.length<2)pD0=null;return;}
    const{col,row}=toCell(touchState.sx,touchState.sy);
    document.getElementById("hx").textContent=col;
    document.getElementById("hy").textContent=row;

    if(curTool==="obj_place"){
      if(touchState._longTimer){clearTimeout(touchState._longTimer);touchState._longTimer=null;}
      {  // always process tap in obj_place mode
        // clean tap
        const tapCell=toCell(touchState.sx,touchState.sy);
        const idx=objAtCell(tapCell.col,tapCell.row);
        if(idx>=0){
          // tap on existing object = open properties
          openObjProps(idx);
        } else if(lockedPos&&lockedPos.col===tapCell.col&&lockedPos.row===tapCell.row){
          // tap2 on same locked cell = PLACE
          doPlaceObject(lockedPos.col,lockedPos.row);
          lockedPos=null;
        } else {
          // tap1 = lock position, update hoverCell
          lockedPos={col:tapCell.col,row:tapCell.row};
          hoverCell={col:tapCell.col,row:tapCell.row};
          scheduleRender();
        }
      }
    } else if(curTool==="obj_move"){
      if(touchState._longTimer){clearTimeout(touchState._longTimer);touchState._longTimer=null;}
      if(touchState.moved&&dragObjStart){pushH();dragObjStart=null;}
      else if(!touchState.moved){selectedObj=null;dragObjStart=null;curTool="obj_place";}
      scheduleRender();
    } else if(curTool==="area"){
      if(touchState._areaStart){
        const s=touchState._areaStart;
        const end=touchState._areaEnd||s;
        if(!touchState.moved){
          const idx=_areaAtCell(s.x1,s.y1);
          if(idx>=0){openAreaProps(idx);touchState=null;return;}
        } else {
          const x1=Math.min(s.x1,end.col),y1=Math.min(s.y1,end.row);
          const x2=Math.max(s.x1,end.col)+1,y2=Math.max(s.y1,end.row)+1;
          if(x2-x1>=1&&y2-y1>=1){
            const id="area_"+Date.now();
            hotAreas.push({id,x1,y1,x2,y2,label:"",tooltip:""});
            _lastAreaId=id;
            toast("🔗 არეალი შეინახა — კვლავ 🔗 ► properties");
            setTool("draw");
          }
        }
      }
      touchState=null;
    } else if(!touchState.moved){
      if(curTool==="draw"||curTool==="erase"){
        if(inB(col,row)){pushH();paintAt(col,row);}
      }
    }
    touchState=null;
  }
  if(e.touches.length<2) pD0=null;
},{passive:false});

let mDraw=false;
canvas.addEventListener("mousedown",e=>{
  if(e.button!==0)return;
  const{col,row}=toCell(e.offsetX,e.offsetY);
  if(curTool==="pick"){if(inB(col,row)){selectTile(map[row][col]);setTool("draw");}return;}
  if(curTool==="fill"){pushH();floodFill(col,row);setTool("pick");return;}
  if(curTool==="obj_place"){
    const idx=objAtCell(col,row);
    if(idx>=0){openObjProps(idx);}
    else{doPlaceObject(col,row);}
    return;
  }
  if(curTool==="obj_move"){
    const idx=objAtCell(col,row);
    if(idx>=0){selectedObj=idx;dragObjStart={col,row,ox:objects[idx].x,oy:objects[idx].y};mDraw=true;}
    else{selectedObj=null;dragObjStart=null;curTool="obj_place";}
    scheduleRender();return;
  }
  if(curTool==="area"){
    const idx=_areaAtCell(col,row);
    if(idx>=0){openAreaProps(idx);}
    else{_pendingArea={x1:col,y1:row};}
    return;
  }
  mDraw=true;pushH();paintAt(col,row);lastC={col,row};
});
canvas.addEventListener("mousemove",e=>{
  const{col,row}=toCell(e.offsetX,e.offsetY);
  hoverCell={col,row};
  if(curTool==="area"&&_pendingArea){
    const ac=document.getElementById("areaCursor");
    const x1=Math.min(_pendingArea.x1,col),y1=Math.min(_pendingArea.y1,row);
    const x2=Math.max(_pendingArea.x1,col)+1,y2=Math.max(_pendingArea.y1,row)+1;
    ac.style.cssText=`display:block;left:${x1*TS*zoom+viewX}px;top:${y1*TS*zoom+viewY}px;width:${(x2-x1)*TS*zoom}px;height:${(y2-y1)*TS*zoom}px;border:2px dashed #facc15;background:rgba(250,204,21,0.1);`;
    scheduleRender();return;
  }
  if(curTool==="obj_place"){scheduleRender();return;}
  if(curTool==="obj_move"&&mDraw&&selectedObj!==null&&dragObjStart){
    const dx=col-dragObjStart.col, dy=row-dragObjStart.row;
    const o=objects[selectedObj];
    const nx=dragObjStart.ox+dx, ny=dragObjStart.oy+dy;
    if(canPlace(nx,ny,o.cols,o.rows,selectedObj)){o.x=nx;o.y=ny;}
    scheduleRender();return;
  }
  if(!mDraw)return;
  if(!lastC||lastC.col!==col||lastC.row!==row){paintAt(col,row);lastC={col,row};}
});
window.addEventListener("mouseup",e=>{
  if(curTool==="area"&&_pendingArea){
    document.getElementById("areaCursor").style.display="none";
    const col=hoverCell?hoverCell.col:_pendingArea.x1;
    const row=hoverCell?hoverCell.row:_pendingArea.y1;
    const x1=Math.min(_pendingArea.x1,col),y1=Math.min(_pendingArea.y1,row);
    const x2=Math.max(_pendingArea.x1,col)+1,y2=Math.max(_pendingArea.y1,row)+1;
    _pendingArea=null;
    if(x2-x1>=1&&y2-y1>=1){
      const id="area_"+Date.now();
      hotAreas.push({id,x1,y1,x2,y2,label:"",tooltip:""});
      _lastAreaId=id;

// ── DUAL GRID RENDER ──
// User paints dt.id into data cells (Grid A).
// We render transition sprites at half-tile offset (Grid B).
// Grid B cell (r,c) covers data corners: [r][c] [r][c+1] [r+1][c] [r+1][c+1]
// Bitmask (which corners contain dt.id): TL=1, TR=2, BL=4, BR=8
// mask 0  → all corners are other tiles → skip
// mask 15 → fully filled → draw full sprite
function renderDualGrid(ctx,m){
  m=m||map;
  dualTiles.forEach(dt=>{
    const compat=dt.compatibleWith||[];
    function dc(nid){return nid===dt.id||compat.includes(nid);}
    for(let r=0;r<ROWS-1;r++){
      for(let c=0;c<COLS-1;c++){
        const mask=
          (dc(m[r  ][c  ])?1:0)|
          (dc(m[r  ][c+1])?2:0)|
          (dc(m[r+1][c  ])?4:0)|
          (dc(m[r+1][c+1])?8:0);
        if(mask===0) continue;
        ctx.imageSmoothingEnabled=false;
        const img=dt.imgs[mask];
        if(img){
          ctx.drawImage(img,(c+0.5)*TS,(r+0.5)*TS,TS,TS);
        } else if(dt.sheetImg&&dt.sprites){
          const sp=dt.sprites[mask];
          if(sp&&typeof sp==='object')
            ctx.drawImage(dt.sheetImg,sp.x,sp.y,sp.w,sp.h,(c+0.5)*TS,(r+0.5)*TS,TS,TS);
        }
      }
    }
  });
}

function objAnchor(col,row,cols,rows){
  return{x:col-Math.floor(cols/2), y:row-Math.floor(rows/2)};
}
function objAtCell(col,row){
  for(let i=objects.length-1;i>=0;i--){
    const o=objects[i];
    if(col>=o.x&&col<o.x+o.cols&&row>=o.y&&row<o.y+o.rows) return i;
  }
  return -1;
}
function canPlace(x,y,cols,rows,skipIdx){
  return inB(x,y)&&inB(x+cols-1,y+rows-1);
}
function doPlaceObject(col,row){
  // col,row = anchor point (finger position), center-adjusted
  const def=getObjDef(curTile);
  if(!def){toast("⚠ ობიექტი არ არის არჩეული");return;}
  const img=getImg(curTile);
  if(!img){toast("⚠ სურათი: "+curTile);return;}
  const x=col-Math.floor(def.cols/2);
  const y=row-Math.floor(def.rows/2);
  if(!canPlace(x,y,def.cols,def.rows,-1)){toast("⚠ საზღვარს გარეთ");return;}
  pushH();
  objects.push({id:def.id,lb:def.lb||def.id,img,cols:def.cols,rows:def.rows,x,y});
  scheduleRender();
  toast("⊞ "+(def.lb||def.id));
}

function clamp(){
  const mw=COLS*TS*zoom,mh=ROWS*TS*zoom,ww=cw.clientWidth,wh=cw.clientHeight;
  const px=Math.max(50,ww*.1),py=Math.max(50,wh*.1);
  viewX=Math.max(ww-mw-px,Math.min(px,viewX));viewY=Math.max(wh-mh-py,Math.min(py,viewY));
}

function makeDualChip(dt){
  const ch=document.createElement("div");
  ch.className="tchip"+(curTile===dt.id?" sel":"");

    const sp=dt.sprites[15]||dt.sprites.find(s=>s&&typeof s==='object');
    if(sp) cv.getContext("2d").drawImage(dt.sheetImg,sp.x,sp.y,sp.w,sp.h,0,0,40,40);
  }
  ch.appendChild(cv);

  lb.textContent="⬡ "+dt.lb;ch.appendChild(lb);
  const xb=document.createElement("button");xb.className="xbtn";xb.textContent="✕";

  let _dlt=null;
  ch.addEventListener("touchstart",e=>{e.stopPropagation();selectTile(dt.id);_dlt=setTimeout(()=>{_dlt=null;openLayerPopup(ch);},500);},{passive:false});
  ch.addEventListener("touchend",()=>{if(_dlt){clearTimeout(_dlt);_dlt=null;}});
  ch.addEventListener("touchmove",()=>{if(_dlt){clearTimeout(_dlt);_dlt=null;}});
  return ch;
}
function makeChip(id,lb,isCustom,isPack){
  const ch=document.createElement("div");
  ch.className="tchip"+(id===curTile?" sel":"");
  ch.dataset.id=id;
  if(id===curTile)_prevTileChip=ch;
  const cv=document.createElement("canvas");cv.width=40;cv.height=40;
  cv.style.width="40px";cv.style.height="40px";
  const ctx=cv.getContext("2d");ctx.imageSmoothingEnabled=false;
  const atTile=tileMap.get(id);
  if(atTile?.autoTile){
    const previewImg=atTile.imgs[15]||atTile.imgs.find(Boolean);
    if(previewImg) ctx.drawImage(previewImg,0,0,40,40);
    else if(atTile.sheetImg&&atTile.sprites){
      const sp=atTile.sprites[15]||atTile.sprites.find(s=>s&&typeof s==='object');
      if(sp) ctx.drawImage(atTile.sheetImg,sp.x,sp.y,sp.w,sp.h,0,0,40,40);
    }
  } else if(atTile?.img){
    ctx.drawImage(atTile.img,0,0,40,40);
  } else if(atTile?.sheetImg){
    ctx.drawImage(atTile.sheetImg,atTile.sx,atTile.sy,atTile.sw,atTile.sh,0,0,40,40);
  }
  ch.appendChild(cv);
  if(isCustom){
    const xb=document.createElement("button");xb.className="xbtn";xb.textContent="✕";
    xb.addEventListener("click",e=>delCustom(id,e));
    xb.addEventListener("touchstart",e=>{e.stopPropagation();delCustom(id,e);},{passive:false});
    ch.appendChild(xb);
  } else if(isPack){
    const xb=document.createElement("button");xb.className="xbtn";xb.textContent="✕";
    xb.addEventListener("click",e=>delPackTile(id,e,"auto"));
    xb.addEventListener("touchstart",e=>{e.stopPropagation();delPackTile(id,e,"auto");},{passive:false});
    ch.appendChild(xb);
  }
  const lbEl=document.createElement("div");lbEl.className="lb";
  const isAt=atTile?.autoTile;
  const isOb=atTile?.isObject;
  lbEl.textContent=(isOb?"⊞ ":isAt?"🔲 ":"")+lb;
  ch.appendChild(lbEl);
  // tap → select, long tap → layer popup
  let _chipLt=null;
  ch.addEventListener("touchstart",e=>{
    e.stopPropagation();
    selectTile(id);
    _chipLt=setTimeout(()=>{_chipLt=null;openLayerPopup(ch);},500);
  },{passive:false});
  ch.addEventListener("touchend",()=>{if(_chipLt){clearTimeout(_chipLt);_chipLt=null;}});
  ch.addEventListener("touchmove",()=>{if(_chipLt){clearTimeout(_chipLt);_chipLt=null;}});
  ch.addEventListener("click",()=>selectTile(id));
  return ch;
}

function _tryMerge(idx){
  if(!_mergeMode||_editingAreaIdx<0||idx===_editingAreaIdx)return false;
  const src=hotAreas[_editingAreaIdx];
  const tgt=hotAreas[idx];
  // assign same groupId
  const gid=src.groupId||(src.id);
  src.groupId=gid;
  tgt.groupId=gid;
  // tgt inherits label/tooltip from src if empty
  if(!tgt.label)tgt.label=src.label;
  if(!tgt.tooltip)tgt.tooltip=src.tooltip;
  _mergeMode=false;
  _editingAreaIdx=-1;
  scheduleRender();
  toast("✓ გაერთიანდა!");

}

  // find the live textarea (same as _insertLink pattern)
  let ta=null;
  document.querySelectorAll("#menuBuilder textarea").forEach(i=>{
    if(i.value===(n.items[idx].label||"")&&!ta)ta=i;
  });
  const s=ta?ta.selectionStart:0, e=ta?ta.selectionEnd:0;
  const sel=ta?ta.value.slice(s,e).trim():"";
  const url=prompt("URL:");if(!url||!url.trim())return;
  const label=sel||url.trim();
  const link="[["+label+"|"+url.trim()+"]]";
  if(ta){
    const newVal=ta.value.slice(0,s)+link+ta.value.slice(e);
    ta.value=newVal;n.items[idx].label=newVal;
    ta.style.height="auto";ta.style.height=ta.scrollHeight+"px";
    ta.focus();ta.setSelectionRange(s+link.length,s+link.length);
  } else {
    const cur=(n.items[idx].label||"").trimEnd();
    n.items[idx].label=cur+(cur?" ":"")+link;
    renderMenuBuilder();
  }
}

function _insertLink(taId){
  const ta=document.getElementById(taId);
  if(!ta)return;
  const start=ta.selectionStart,end=ta.selectionEnd;
  const sel=ta.value.slice(start,end).trim();
  const url=prompt("URL:");
  if(!url)return;
  const label=sel||prompt("ლინკის ტექსტი:")||url;
  const link="[["+label+"|"+url+"]]";
  ta.value=ta.value.slice(0,start)+link+ta.value.slice(end);
  ta.focus();ta.setSelectionRange(start+link.length,start+link.length);
}

function loadSpritePack(e){
  const files=Array.from(e.target.files);if(!files.length)return;
  e.target.value="";
  files.forEach(f=>{
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      const sheetUrl=d.spritesheet||null;

      function withSheet(cb){
        if(sheetUrl){
          const sh=new Image();
          sh.onload=()=>cb(sh);
          sh.onerror=()=>{toast("⚠ sheet ვერ ჩაიტვირთა: "+sheetUrl);cb(null);};
          sh.src=sheetUrl;
        } else cb(null);
      }

      withSheet(sheet=>{

      // ── dual grid tiles ──
      if(d.dualTiles&&d.dualTiles.length){
        const newDts=d.dualTiles.filter(dt=>!dualTiles.find(t=>t.id===dt.id));
        if(newDts.length){
          newDts.forEach(dt=>{
            const rawSprites=dt.sprites||[];
            const hasCoords=rawSprites.some(s=>s&&typeof s==='object'&&s.x!=null);
            if(hasCoords&&sheet){
              // coord-based — store sheetImg directly
              dualTiles.push({...dt,sheetUrl,sheetImg:sheet,imgs:Array(16).fill(null)});
              rebuildTileMap();buildPalette();
              toast("[⬡ Dual] "+newDts.map(t=>t.lb).join(", ")+" ჩაიტვირთა");
            } else {
              let loaded=0;
              _loadDualTiles([dt],()=>{
                if(++loaded>=1){rebuildTileMap();buildPalette();
                  toast("[⬡ Dual] "+newDts.map(t=>t.lb).join(", ")+" ჩაიტვირთა");}
              });
            }
          });
        }
      }

      // ── auto-tile groups ──
      if(d.autoTiles&&d.autoTiles.length){
        let atTotal=d.autoTiles.length, atLoaded=0;
        d.autoTiles.forEach(at=>{
          const rawSprites=at.sprites||[];
          const hasCoords=rawSprites.some(s=>s&&typeof s==='object'&&s.x!=null);
          // coord-based sprites + sheet loaded → store sheetImg directly
          if(hasCoords&&sheet){
            if(!autoTiles.find(t=>t.id===at.id))
              autoTiles.push({id:at.id,lb:at.lb||at.id,autoTile:true,sprites:rawSprites,
                imgs:Array(16).fill(null),sheetImg:sheet,sheetUrl,
                baseTileId:at.baseTileId||null,compatibleWith:at.compatibleWith||[],category:at.category||""});
            atLoaded++;checkAtDone();
            return;
          }
          // base64 sprites — existing path
          const imgs=Array(16).fill(null);
          let spritesDone=0;
          const srcs=rawSprites.map(s=>{
            if(!s) return null;
            if(typeof s==='string') return s;
            return null;
          });
          const validSrcs=srcs.filter(Boolean);
          if(!validSrcs.length){atLoaded++;checkAtDone();return;}
          srcs.forEach((src,idx)=>{
            if(!src){spritesDone++;if(spritesDone===srcs.length){atLoaded++;checkAtDone();}return;}
            const img=new Image();
            img.onload=()=>{
              imgs[idx]=img;spritesDone++;
              if(spritesDone===srcs.length){
                if(!autoTiles.find(t=>t.id===at.id))
                  autoTiles.push({id:at.id,lb:at.lb||at.id,autoTile:true,sprites:rawSprites,imgs,
                    ...(sheetUrl?{sheetUrl}:{}),
                    baseTileId:at.baseTileId||null,compatibleWith:at.compatibleWith||[],category:at.category||""});
                atLoaded++;checkAtDone();
              }
            };
            img.onerror=()=>{spritesDone++;if(spritesDone===srcs.length){atLoaded++;checkAtDone();}};
            img.src=src;
          });
        });
        function checkAtDone(){
          if(atLoaded===atTotal){
            buildPalette();rebuildOff();scheduleRender();
            if(!curTile&&autoTiles.length){selectTile(autoTiles[0].id);} buildBuildingGrid();
            toast("🔲 "+atLoaded+" ავტო-ფილა ჩაიტვირთა!");
          }
        }
      }

      // ── regular tiles ──
      const list=d.tiles||(!d.autoTiles?d:[]);
      if(Array.isArray(list)&&list.length){
        let loaded=0;
        list.forEach(t=>{
          // coord-based tile — store sheetImg directly, no toDataURL needed
          if(sheet&&t.x!=null){
            if(!customTiles.find(ct=>ct.id===t.id)){
              const entry={id:t.id||("sp_"+Date.now()),lb:t.lb||"tile",
                sheetImg:sheet,sx:t.x,sy:t.y,sw:t.w,sh:t.h,
                sheetUrl,category:t.category||""};
              if(t.isObject){entry.isObject=true;entry.cols=t.cols||1;entry.rows=t.rows||1;}
              customTiles.push(entry);
            }
            if(++loaded===list.length){
              buildPalette();
              const firstNonObj=customTiles.find(t=>!t.isObject);
              if(firstNonObj&&!baseTile) baseTile=firstNonObj.id;
              const firstObj=customTiles.find(t=>t.isObject);
              if(firstObj){
                selectBuilding(firstObj.id);
                document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
                document.getElementById("tab-build").classList.add("on");
                document.getElementById("tabTiles").style.display="none";
                document.getElementById("tabBuildings").style.display="block";
                document.getElementById("tabTools").style.display="none";
              } else if(customTiles.length){
                selectTile(customTiles.find(t=>!t.isObject)?.id||customTiles[0].id);
              }
              const objCount=customTiles.filter(t=>t.isObject).length;
              const tileCount=customTiles.filter(t=>!t.isObject).length;
              toast("📦 "+(objCount?"📁"+objCount+" ობიექტი ":"")+(tileCount?"🗂"+tileCount+" ფილა":"")+" ჩაიტვირთა");
            }
            return;
          }
          // base64 tile — existing path
          let src=t.src||null;
          if(!src){loaded++;return;}
          const img=new Image();
          img.onload=()=>{
            if(!customTiles.find(ct=>ct.id===t.id)){
              const entry={id:t.id||("sp_"+Date.now()),lb:t.lb||"tile",src,img,category:t.category||""};
              if(t.isObject){entry.isObject=true;entry.cols=t.cols||1;entry.rows=t.rows||1;}
              customTiles.push(entry);
            }
            if(++loaded===list.length){
              buildPalette();
              const firstNonObj=customTiles.find(t=>!t.isObject);
              if(firstNonObj&&!baseTile) baseTile=firstNonObj.id;
              const firstObj=customTiles.find(t=>t.isObject);
              if(firstObj){
                selectBuilding(firstObj.id);
                document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
                document.getElementById("tab-build").classList.add("on");
                document.getElementById("tabTiles").style.display="none";
                document.getElementById("tabBuildings").style.display="block";
                document.getElementById("tabTools").style.display="none";
              } else if(customTiles.length){
                selectTile(customTiles.find(t=>!t.isObject)?.id||customTiles[0].id);
              }
              const objCount=customTiles.filter(t=>t.isObject).length;
              const tileCount=customTiles.filter(t=>!t.isObject).length;
              toast("📦 "+(objCount?"📁"+objCount+" ობიექტი ":"")+(tileCount?"🗂"+tileCount+" ფილა":"")+" ჩაიტვირთა");
            }
          };
          img.onerror=()=>{loaded++;};
          img.src=src;
        });
      }

      }); // end withSheet
    }catch(err){toast("⚠ "+err.message);}
  };
  rd.readAsText(f);
  }); // end files.forEach
}

function _loadDualTiles(arr,cb){
  arr.forEach(dt=>{
    const rawSprites=dt.sprites||[];
    const hasCoords=rawSprites.some(s=>s&&typeof s==='object'&&s.x!=null);
    if(dt.sheetUrl&&hasCoords){
      _loadSheet(dt.sheetUrl,sh=>{
        dualTiles.push({...dt,imgs:Array(16).fill(null),...(sh?{sheetImg:sh}:{})});
        cb();
      });
      return;
    }
    // base64 path
    const imgs=Array(16).fill(null);
    function doLoad(srcs){
      const valid=srcs.map((s,i)=>({s,i})).filter(x=>x.s);
      if(!valid.length){dualTiles.push({...dt,imgs});cb();return;}
      let done=0;
      valid.forEach(({s,i})=>{
        const img=new Image();
        img.onload=()=>{imgs[i]=img;if(++done>=valid.length){dualTiles.push({...dt,imgs});cb();}};
        img.onerror=()=>{if(++done>=valid.length){dualTiles.push({...dt,imgs});cb();}};
        img.src=s;
      });
    }
    if(dt.sheetUrl){
      _loadSheet(dt.sheetUrl,sh=>{
        if(!sh){dualTiles.push({...dt,imgs});cb();return;}
        const srcs=rawSprites.map(s=>{
          if(!s)return null;
          if(typeof s==='string')return s;
          const cv=document.createElement("canvas");cv.width=s.w;cv.height=s.h;
          cv.getContext("2d").drawImage(sh,s.x,s.y,s.w,s.h,0,0,s.w,s.h);
          return cv.toDataURL("image/png");
        });
        doLoad(srcs);
      });
    } else {
      doLoad(rawSprites);
    }
  });
}


function _loadCustomTile(ct,onDone){
  if(ct.sheetUrl){
    _loadSheet(ct.sheetUrl,sh=>{
      if(!sh){onDone();return;}
      // store sheetImg directly — no toDataURL, no CORS needed
      const entry={id:ct.id,lb:ct.lb,
        sheetImg:sh,sx:ct.x,sy:ct.y,sw:ct.w,sh:ct.h,
        sheetUrl:ct.sheetUrl};
      if(ct.isObject){entry.isObject=true;entry.cols=ct.cols||1;entry.rows=ct.rows||1;}
      customTiles.push(entry);onDone();
    });
  } else {
    const img=new Image();img.onload=()=>{
      const entry={id:ct.id,lb:ct.lb,img};
      entry.src=ct.src;
      if(ct.isObject){entry.isObject=true;entry.cols=ct.cols||1;entry.rows=ct.rows||1;}
      customTiles.push(entry);onDone();
    };img.onerror=onDone;img.src=ct.src;
  }
}

// ── load autoTiles array — handles sheetUrl or base64 sprites ──
function _loadAutoTilesArr(ats,onEach){
  ats.forEach(at=>{
    const rawSprites=at.sprites||[];
    const hasCoords=rawSprites.some(s=>s&&typeof s==='object'&&s.x!=null);
    if(at.sheetUrl&&hasCoords){
      _loadSheet(at.sheetUrl,sh=>{
        if(!sh){autoTiles.push({...at,imgs:Array(16).fill(null)});onEach();return;}
        autoTiles.push({...at,imgs:Array(16).fill(null),sheetImg:sh});
        onEach();
      });
      return;
    }
    // base64 sprites
    const imgs=Array(16).fill(null);let sdone=0;
    function fromSrcs(srcs){
      const total=srcs.filter(Boolean).length;
      if(!total){autoTiles.push({...at,imgs});onEach();return;}
      srcs.forEach((src,idx)=>{
        if(!src)return;
        const img=new Image();
        img.onload=()=>{imgs[idx]=img;if(++sdone>=total){autoTiles.push({...at,imgs});onEach();}};
        img.onerror=()=>{if(++sdone>=total){autoTiles.push({...at,imgs});onEach();}};
        img.src=src;
      });
    }
    if(at.sheetUrl){
      _loadSheet(at.sheetUrl,sh=>{
        if(!sh){autoTiles.push({...at,imgs});onEach();return;}
        const srcs=rawSprites.map(s=>{
          if(!s)return null;if(typeof s==='string')return s;
          const cv=document.createElement("canvas");cv.width=s.w;cv.height=s.h;
          cv.getContext("2d").drawImage(sh,s.x,s.y,s.w,s.h,0,0,s.w,s.h);
          return cv.toDataURL("image/png");
        });
        fromSrcs(srcs);
      });
    } else {
      fromSrcs(rawSprites);
    }
  });
}

      function done(){
        if(--pending<=0){

          scheduleRender();toast("📂 ჩატვირთულია");

function restoreObjects(savedObjs){
  if(!savedObjs||!savedObjs.length){objects=[];scheduleRender();return;}
  objects=[];
  savedObjs.forEach(o=>{
    const def=tileMap.get(o.id);
    if(!def)return;
    const img=def.img||getImg(o.id);
    if(img) objects.push({...o,img});
  });
  scheduleRender();
}

// ── local sheet cache: sheetUrl → dataURL (for untainted PNG export) ──
const _localSheetCache=new Map();

function exportPNG(){
  const usedIds=new Set(map.flat().filter(Boolean));
  const coordTiles=[...customTiles,...autoTiles,...dualTiles].filter(t=>t.sheetUrl&&usedIds.has(t.id));
  const neededUrls=[...new Set(coordTiles.map(t=>t.sheetUrl))];

  // check which URLs still need a local file
  const missing=neededUrls.filter(u=>!_localSheetCache.has(u));

  if(missing.length>0){
    // build human-readable file names from URLs
    const names=missing.map(u=>u.split("/").pop()).join(", ");
    toast("📂 ატვირთე ლოკალური ფაილი(ები): "+names);
    const inp=document.createElement("input");
    inp.type="file";inp.accept="image/png,image/*";inp.multiple=true;
    inp.onchange=()=>{
      const files=Array.from(inp.files);
      let loaded=0;
      files.forEach(f=>{
        const rd=new FileReader();
        rd.onload=ev=>{
          // match by filename
          const fname=f.name;
          missing.forEach(u=>{
            if(u.endsWith("/"+fname)||u.split("/").pop()===fname){
              _localSheetCache.set(u,ev.target.result);
            }
          });
          if(++loaded===files.length) _doExportPNG(neededUrls);
        };
        rd.readAsDataURL(f);
      });
    };
    inp.click();
    return;
  }

  _doExportPNG(neededUrls);
}

function _doExportPNG(neededUrls){
  // build a clean sheet map: sheetUrl → local Image (from data URL, untainted)
  const cleanSheets=new Map();
  const toLoad=[];
  neededUrls.forEach(u=>{
    if(_localSheetCache.has(u)){
      const img=new Image();
      img.src=_localSheetCache.get(u);
      cleanSheets.set(u,img);
      if(!img.complete) toLoad.push(img);
    }
  });

  function doRender(){
    const exp=document.createElement("canvas");
    exp.width=COLS*TS; exp.height=ROWS*TS;
    const ectx=exp.getContext("2d");
    ectx.imageSmoothingEnabled=false;
    ectx.fillStyle="#111";ectx.fillRect(0,0,exp.width,exp.height);

    // find bounding box of painted cells (base + overlay)
    let minC=COLS,maxC=0,minR=ROWS,maxR=0;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if(map[r][c]||(overlayMap[r]&&overlayMap[r][c])){
        if(c<minC)minC=c;if(c>maxC)maxC=c;
        if(r<minR)minR=r;if(r>maxR)maxR=r;
      }
    }
    if(minC>maxC){minC=0;maxC=COLS-1;minR=0;maxR=ROWS-1;} // empty map fallback

    // helper: draw a tile using clean local sheet or cached img
    function drawClean(t,ox,oy,sw,sh,sp){
      if(sp&&typeof sp==='object'&&sp.w>0){
        const sh2=cleanSheets.get(t.sheetUrl);
        if(sh2) ectx.drawImage(sh2,sp.x,sp.y,sp.w,sp.h,ox,oy,TS,TS);
      } else if(typeof sp==='string'){
        const bi=new Image(); bi.onload=()=>ectx.drawImage(bi,ox,oy,TS,TS); bi.src=sp;
      } else if(t.img){
        ectx.drawImage(t.img,ox,oy,TS,TS);
      }
    }

    // Pass 1: base tiles
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const id=map[r][c]; if(!id)continue;
      const t=tileMap.get(id); if(!t||t.autoTile||t.dualTile)continue;
      if(t.sheetUrl){
        const sh=cleanSheets.get(t.sheetUrl);
        if(sh) ectx.drawImage(sh,t.sx,t.sy,t.sw,t.sh,c*TS,r*TS,TS,TS);
      } else if(t.img){
        ectx.drawImage(t.img,c*TS,r*TS,TS,TS);
      }
    }

    // Pass 2: dual grid
    dualTiles.forEach(dt=>{
      const compat=dt.compatibleWith||[];
      function dc(nid){return nid===dt.id||compat.includes(nid);}
      for(let r=0;r<ROWS-1;r++) for(let c=0;c<COLS-1;c++){
        const mask=(dc(map[r][c])?1:0)|(dc(map[r][c+1])?2:0)|(dc(map[r+1][c])?4:0)|(dc(map[r+1][c+1])?8:0);
        if(!mask)continue;
        const sp=(dt.sprites||[])[mask];
        if(sp) drawClean(dt,(c+0.5)*TS,(r+0.5)*TS,TS,TS,sp);
      }
    });

    // Pass 3: autoTiles
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const id=map[r][c]; if(!id)continue;
      const t=tileMap.get(id); if(!t||!t.autoTile)continue;
      const compat=t.compatibleWith||[];
      let m=0;
      if(r>0      &&(map[r-1][c]===id||compat.includes(map[r-1][c])))m|=1;
      if(c<COLS-1 &&(map[r][c+1]===id||compat.includes(map[r][c+1])))m|=2;
      if(r<ROWS-1 &&(map[r+1][c]===id||compat.includes(map[r+1][c])))m|=4;
      if(c>0      &&(map[r][c-1]===id||compat.includes(map[r][c-1])))m|=8;
      const sprites=t.sprites||[];
      const sp=sprites[m]||sprites[0]||sprites.find(v=>v&&typeof v==='object'&&v.w>0)||sprites.find(Boolean);
      if(sp) drawClean(t,c*TS,r*TS,TS,TS,sp);
    }

    // Pass 4: overlay base tiles
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const id=overlayMap[r]?.[c]; if(!id)continue;
      const t=tileMap.get(id); if(!t||t.autoTile||t.dualTile)continue;
      if(t.sheetUrl){
        const sh=cleanSheets.get(t.sheetUrl);
        if(sh) ectx.drawImage(sh,t.sx,t.sy,t.sw,t.sh,c*TS,r*TS,TS,TS);
      } else if(t.img){ ectx.drawImage(t.img,c*TS,r*TS,TS,TS); }
    }

    // Pass 5: overlay dual grid
    dualTiles.forEach(dt=>{
      const compat=dt.compatibleWith||[];
      function dc2(nid){return nid===dt.id||compat.includes(nid);}
      for(let r=0;r<ROWS-1;r++) for(let c=0;c<COLS-1;c++){
        const mask=(dc2(overlayMap[r]?.[c])?1:0)|(dc2(overlayMap[r]?.[c+1])?2:0)|(dc2(overlayMap[r+1]?.[c])?4:0)|(dc2(overlayMap[r+1]?.[c+1])?8:0);
        if(!mask)continue;
        const sp=(dt.sprites||[])[mask];
        if(sp) drawClean(dt,(c+0.5)*TS,(r+0.5)*TS,TS,TS,sp);
      }
    });

    // Pass 6: overlay autoTiles
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const id=overlayMap[r]?.[c]; if(!id)continue;
      const t=tileMap.get(id); if(!t||!t.autoTile)continue;
      const compat=t.compatibleWith||[];
      let m=0;
      if(r>0      &&(overlayMap[r-1]?.[c]===id||compat.includes(overlayMap[r-1]?.[c])))m|=1;
      if(c<COLS-1 &&(overlayMap[r]?.[c+1]===id||compat.includes(overlayMap[r]?.[c+1])))m|=2;
      if(r<ROWS-1 &&(overlayMap[r+1]?.[c]===id||compat.includes(overlayMap[r+1]?.[c])))m|=4;
      if(c>0      &&(overlayMap[r]?.[c-1]===id||compat.includes(overlayMap[r]?.[c-1])))m|=8;
      const sprites=t.sprites||[];
      const sp=sprites[m]||sprites[0]||sprites.find(v=>v&&typeof v==='object'&&v.w>0)||sprites.find(Boolean);
      if(sp) drawClean(t,c*TS,r*TS,TS,TS,sp);
    }

    // Pass 7: objects — use cleanSheets to avoid taint
    objects.forEach(obj=>{
      const def=tileMap.get(obj.id);
      if(def&&def.sheetUrl){
        const sh=cleanSheets.get(def.sheetUrl);
        if(sh) ectx.drawImage(sh,def.sx,def.sy,def.sw,def.sh,
          obj.x*TS,obj.y*TS,obj.cols*TS,obj.rows*TS);
      } else if(def&&def.src){
        if(obj.img) ectx.drawImage(obj.img,obj.x*TS,obj.y*TS,obj.cols*TS,obj.rows*TS);
      }
    });

    // Pass 8: speech bubble labels
    objects.forEach(obj=>{
      if(!obj.title)return;
      const text=obj.title;
      const cx=(obj.x+obj.cols/2)*TS, by=obj.y*TS;
      const fs=11,pad=5,r=5,tail=6;
      ectx.save();
      ectx.font="bold "+fs+"px sans-serif";
      const tw=ectx.measureText(text).width;
      const bw=tw+pad*2, bh=fs+pad*2;
      const bx=cx-bw/2, bty=by-bh-tail-2;
      ectx.fillStyle="rgba(20,20,30,0.82)";
      ectx.beginPath();
      ectx.moveTo(bx+r,bty);ectx.lineTo(bx+bw-r,bty);
      ectx.arcTo(bx+bw,bty,bx+bw,bty+r,r);ectx.lineTo(bx+bw,bty+bh-r);
      ectx.arcTo(bx+bw,bty+bh,bx+bw-r,bty+bh,r);
      ectx.lineTo(cx+tail,bty+bh);ectx.lineTo(cx,bty+bh+tail);ectx.lineTo(cx-tail,bty+bh);
      ectx.lineTo(bx+r,bty+bh);ectx.arcTo(bx,bty+bh,bx,bty+bh-r,r);
      ectx.lineTo(bx,bty+r);ectx.arcTo(bx,bty,bx+r,bty,r);
      ectx.closePath();ectx.fill();
      ectx.strokeStyle="rgba(240,165,0,0.7)";ectx.lineWidth=1;ectx.stroke();
      ectx.fillStyle="#ffffff";ectx.textAlign="center";ectx.textBaseline="middle";
      ectx.fillText(text,cx,bty+bh/2);
      ectx.restore();
    });

    const pname=(currentProjectName||"rpg-map").replace(/[^a-zA-Z0-9ა-ჿ_\-]/g,"_");
    // crop to painted content
    const cx=minC*TS, cy=minR*TS;
    const cw2=(maxC-minC+1)*TS, ch2=(maxR-minR+1)*TS;
    const cropped=document.createElement("canvas");
    cropped.width=cw2; cropped.height=ch2;
    cropped.getContext("2d").drawImage(exp,cx,cy,cw2,ch2,0,0,cw2,ch2);
    try{
      cropped.toBlob(blob=>{
        if(!blob){toast("⚠ PNG ჩამოტვირთვა ვერ მოხდა");return;}
        downloadFile(blob,pname+".png","image/png");
        toast("🖼 "+pname+".png შენახულია");
      },"image/png");
    }catch(e){
      toast("⚠ PNG: "+e.message);
    }
  }

  if(toLoad.length===0){doRender();return;}
  let done=0;
  toLoad.forEach(img=>{img.onload=()=>{if(++done>=toLoad.length)doRender();};});
}


// ── MENU BUILDER ──
let _menuSections=[];

// ── Node lookup (any depth) ──
function _findNode(id,nodes){
  for(const n of (nodes||_menuSections)){
    if(n.id===id)return n;
    if(n.children){const f=_findNode(id,n.children);if(f)return f;}
  }
  return null;
}
function _removeChildById(id,nodes){
  for(const n of (nodes||_menuSections)){
    if(n.children){
      const idx=n.children.findIndex(c=>c.id===id);
      if(idx>=0){n.children.splice(idx,1);return true;}
      if(_removeChildById(id,n.children))return true;
    }
  }
  return false;
}

function addMenuSection(){
  _menuSections.push({id:"sec_"+Date.now(),icon:"📁",title:"",items:[],children:[]});
  renderMenuBuilder();
}

function _addItem(nodeId,type){
  const n=_findNode(nodeId);if(!n)return;
  if(type==="progress") n.items.push({type:"progress",emoji:"📊",label:"",value:100});
  else n.items.push({type:"text",emoji:"•",label:""});
  renderMenuBuilder();
}
function _addChild(nodeId){
  const n=_findNode(nodeId);if(!n)return;
  if(!n.children)n.children=[];
  n.children.push({id:"nd_"+Date.now(),icon:"📁",title:"",items:[],children:[]});
  renderMenuBuilder();
}
function _removeSection(secId){_menuSections=_menuSections.filter(s=>s.id!==secId);renderMenuBuilder();}
function _removeChild(childId){_removeChildById(childId);renderMenuBuilder();}
function _removeItem(nodeId,idx){const n=_findNode(nodeId);if(n){n.items.splice(idx,1);renderMenuBuilder();}}
function _updateNodeMeta(nodeId,key,val){const n=_findNode(nodeId);if(n)n[key]=val;}
function _updateItem(nodeId,idx,key,val){
  const n=_findNode(nodeId);if(!n)return;
  const item=n.items[idx];if(item==null)return;
  if(typeof item==="string"){n.items[idx]={type:"text",emoji:"•",label:val};return;}
  item[key]=val;
}

const _ISTYLE="flex:1;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:12px;padding:4px 6px;border-radius:4px;";
const _ESTYLE="width:30px;text-align:center;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:2px;font-size:13px;";

function _renderNode(node,depth,isRoot){
  const wrap=document.createElement("div");
  const bc=depth===0?"var(--accent)":depth===1?"var(--border)":"#2a3040";
  wrap.style.cssText=`background:var(--bg);border:1px solid ${bc};border-radius:6px;padding:8px;display:flex;flex-direction:column;gap:5px;${depth>0?"margin-left:"+(depth*10)+"px;":""}`;
  // header
  const hdr=document.createElement("div");hdr.style.cssText="display:flex;gap:5px;align-items:center;";
  const iconI=document.createElement("input");iconI.value=node.icon||"📁";iconI.style.cssText=_ESTYLE;iconI.oninput=()=>_updateNodeMeta(node.id,"icon",iconI.value);
  const titleI=document.createElement("input");titleI.value=node.title||"";titleI.placeholder=depth===0?"სექციის სახელი":"ქვე-სექციის სახელი";
  titleI.style.cssText="flex:1;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:"+(depth===0?"13px":"12px")+";padding:3px 6px;border-radius:4px;";
  titleI.oninput=()=>_updateNodeMeta(node.id,"title",titleI.value);
  const delB=document.createElement("button");delB.textContent="✕";delB.style.cssText="background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;";
  delB.onclick=()=>isRoot?_removeSection(node.id):_removeChild(node.id);
  hdr.appendChild(iconI);hdr.appendChild(titleI);hdr.appendChild(delB);wrap.appendChild(hdr);
  // items
  (node.items||[]).forEach((item,idx)=>{
    const itObj=typeof item==="string"?{type:"text",emoji:"•",label:item}:item;
    const row=document.createElement("div");row.style.cssText="display:flex;gap:5px;align-items:center;padding-left:8px;";
    const emojiI=document.createElement("input");emojiI.value=itObj.emoji||(itObj.type==="progress"?"📊":"•");emojiI.style.cssText=_ESTYLE;emojiI.oninput=()=>_updateItem(node.id,idx,"emoji",emojiI.value);
    const labelI=document.createElement("textarea");labelI.value=itObj.label||"";
    labelI.placeholder=itObj.type==="progress"?"სახელი":"ტექსტი ან [[სახელი|url]]";
    labelI.rows=1;
    labelI.style.cssText=_ISTYLE+"resize:none;overflow-y:auto;min-height:62px;max-height:130px;line-height:1.5;font-family:monospace;";
    labelI.oninput=()=>{labelI.style.height="auto";labelI.style.height=Math.min(labelI.scrollHeight,130)+"px";_updateItem(node.id,idx,"label",labelI.value);};
    const rmB=document.createElement("button");rmB.textContent="✕";rmB.style.cssText="background:none;border:none;color:var(--muted);cursor:pointer;flex-shrink:0;";rmB.onclick=()=>_removeItem(node.id,idx);
    row.appendChild(emojiI);
    if(itObj.type==="text"){
      // wrap label + link button in a column
      const col2=document.createElement("div");col2.style.cssText="flex:1;display:flex;flex-direction:column;gap:3px;";
      col2.appendChild(labelI);
      const lnkB=document.createElement("button");lnkB.textContent="+ ლინკი";
      lnkB.style.cssText="background:none;border:1px solid var(--blue);color:var(--blue);font-size:10px;padding:1px 7px;border-radius:10px;cursor:pointer;flex-shrink:0;";
      lnkB.onclick=()=>_insertLinkIntoItem(node.id,idx);
      const lnkHint=document.createElement("span");
      lnkHint.textContent="ტექსტი|URL";
      lnkHint.style.cssText="font-size:10px;color:var(--muted);";
      const lnkRow=document.createElement("div");
      lnkRow.style.cssText="display:flex;align-items:center;gap:5px;";
      lnkRow.appendChild(lnkB);lnkRow.appendChild(lnkHint);
      col2.appendChild(lnkRow);
      row.appendChild(col2);
    } else {
      row.appendChild(labelI);
    }
    if(itObj.type==="progress"){
      const valI=document.createElement("input");valI.type="number";valI.value=itObj.value!=null?itObj.value:100;valI.min=0;valI.max=100;
      valI.style.cssText="width:46px;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:12px;padding:2px 4px;border-radius:4px;text-align:center;";
      valI.oninput=()=>_updateItem(node.id,idx,"value",+valI.value);
      const pct=document.createElement("span");pct.textContent="%";pct.style.cssText="font-size:11px;color:var(--muted);";
      row.appendChild(valI);row.appendChild(pct);
    }
    row.appendChild(rmB);wrap.appendChild(row);
  });
  // children recursively
  (node.children||[]).forEach(child=>{wrap.appendChild(_renderNode(child,depth+1,false));});
  // action buttons
  const acts=document.createElement("div");acts.style.cssText="display:flex;gap:5px;padding-left:8px;flex-wrap:wrap;";
  const mkA=(lbl,fn)=>{const b=document.createElement("button");b.textContent=lbl;b.style.cssText="background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:2px 7px;border-radius:10px;cursor:pointer;";b.onclick=fn;return b;};
  acts.appendChild(mkA("+ ტექსტი",()=>_addItem(node.id,"text")));
  acts.appendChild(mkA("+ ინდიკატორი",()=>_addItem(node.id,"progress")));
  acts.appendChild(mkA("+ ქვე-სექცია",()=>_addChild(node.id)));
  wrap.appendChild(acts);return wrap;
}

function renderMenuBuilder(){
  const el=document.getElementById("menuBuilder");el.innerHTML="";
  _menuSections.forEach(sec=>el.appendChild(_renderNode(sec,0,true)));
}


function getMenuData(){
  function ser(n){return{id:n.id,icon:n.icon||"📁",title:n.title,
    items:(n.items||[]).map(i=>typeof i==="string"?{type:"text",emoji:"•",label:i}:i).filter(i=>i.label||i.type==="progress"),
    children:(n.children||[]).filter(c=>c.title).map(ser)};}
  return _menuSections.filter(s=>s.title).map(ser);
}

<body>
<div id="topbar">
  <span id="mapTitle">${currentProjectName||"RPG Map"}</span>
</div>
<div id="mapWrap">
  <div id="sizer" style="width:${w}px;height:${h}px;"></div>
  <div id="mapInner">
    ${useCanvasRenderer
      ? `<canvas id="mapImg" width="${w}" height="${h}" style="display:block;image-rendering:pixelated;image-rendering:crisp-edges;"></canvas>`
      : `<img id="mapImg" src="${b64}" width="${w}" height="${h}">`
    }
    ${allHotspots}
  </div>
</div>
${mapDesc?`<button id="questBtn" onclick="toggleQuest()">?</button><div id="questPopup">${mapDesc.replace(/\n/g,'<br>')}</div>`:`<button id="questBtn" onclick="toggleQuest()" style="display:none">?</button>`}
<button id="menuBtn" onclick="toggleMenu()">☰</button>
<div id="gameMenu">
  <button class="gmClose" onclick="toggleMenu()">✕</button>

</div>
<div id="hsPopup">
  <button id="hsClose" onclick="closeHsPopup()">✕</button>
  <div id="hsPopupTitle"></div>
  <div id="hsPopupBody"></div>
</div>

  <button class="ap-close" onclick="closeAreaPopup()">✕</button>
