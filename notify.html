<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>შეტყობინება — Mdelo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0d1117;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px;font-family:sans-serif;color:#e6edf3;}
h1{font-size:18px;font-weight:700;color:#f0a500;margin-bottom:24px;text-align:center;}
.form{width:100%;max-width:420px;display:flex;flex-direction:column;gap:14px;}
label{font-size:12px;color:#8b949e;margin-bottom:4px;display:block;}
input,textarea{width:100%;background:#161b22;border:1px solid #30363d;color:#e6edf3;font-size:14px;padding:10px 12px;border-radius:8px;font-family:sans-serif;outline:none;}
input:focus,textarea:focus{border-color:#f0a500;}
textarea{resize:none;min-height:80px;}
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.type-btn{padding:10px 4px;border-radius:8px;border:2px solid #30363d;background:#161b22;color:#8b949e;font-size:12px;cursor:pointer;text-align:center;transition:all .15s;}
.type-btn.sel{border-color:var(--c);color:var(--c);background:rgba(255,255,255,0.04);}
.type-btn[data-type="info"]{--c:#58a6ff;}
.type-btn[data-type="warning"]{--c:#f0a500;}
.type-btn[data-type="danger"]{--c:#fb8f44;}
.type-btn[data-type="done"]{--c:#4ade80;}
.type-btn[data-type="project"]{--c:#c084fc;}
.type-btn[data-type="consensus"]{--c:#2dd4bf;}
.send-btn{width:100%;padding:14px;background:#f0a500;color:#000;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:4px;}
.send-btn:active{opacity:0.8;}
.send-btn:disabled{background:#30363d;color:#8b949e;cursor:default;}
.divider{width:100%;max-width:420px;border:none;border-top:1px solid #30363d;margin:20px 0 8px;}
.my-title{width:100%;max-width:420px;font-size:12px;color:#8b949e;margin-bottom:8px;}
.notif-list{width:100%;max-width:420px;display:flex;flex-direction:column;gap:6px;}
.notif-item{display:flex;align-items:center;gap:10px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 12px;}
.notif-symbol{font-size:18px;flex-shrink:0;}
.notif-text{flex:1;font-size:13px;color:#e6edf3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.notif-del{background:none;border:1px solid #f85149;color:#f85149;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;flex-shrink:0;}
.notif-del:active{opacity:0.7;}
.empty{width:100%;max-width:420px;font-size:12px;color:#8b949e;text-align:center;padding:10px 0;}
#toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:10px 20px;border-radius:8px;font-size:13px;z-index:99;}
</style>
</head>
<body>
<h1>📡 შეტყობინება</h1>
<div class="form">

  <div>
    <label>შენი სახელი</label>
    <input type="text" id="sender" placeholder="სახელი" maxlength="30" oninput="onSenderChange()">
  </div>

  <div>
    <label>ტიპი</label>
    <div class="type-grid">
      <div class="type-btn" data-type="info">💬 ინფო</div>
      <div class="type-btn" data-type="warning">⚠ გაფრთხ.</div>
      <div class="type-btn" data-type="danger">❗ სასწრაფო</div>
      <div class="type-btn" data-type="done">✅ მზადაა</div>
      <div class="type-btn" data-type="project">🚀 პროექტი</div>
      <div class="type-btn" data-type="consensus">🗳️ კონსენსუსი</div>
    </div>
  </div>

  <div>
    <label id="textLabel">მთავარი ტექსტი</label>
    <input type="text" id="text" placeholder="კატის საჭმელი იწურება" maxlength="100">
  </div>

  <div>
    <label>დეტალი (არასავალდებულო)</label>
    <textarea id="detail" placeholder="დამატებითი ინფორმაცია..."></textarea>
  </div>

  <div>
    <label>მიბმული ადგილი (არასავალდებულო)</label>
    <input type="text" id="linked_area" placeholder="მაგ: main_field, gate..." maxlength="50">
  </div>

  <div id="consensusFields" style="display:none;flex-direction:column;gap:14px;">
    <div>
      <label>ვადა (არასავალდებულო)</label>
      <input type="datetime-local" id="deadline">
    </div>
    <div>
      <label>კვორუმი — რამდენი ხმაა საჭირო (არასავალდებულო)</label>
      <input type="number" id="quorum_count" min="1" placeholder="მაგ: 5">
    </div>
    <div>
      <label>ტერმინალის ბრძანება დადებით შედეგზე (არასავალდებულო)</label>
      <input type="text" id="terminal_cmd" placeholder="მაგ: /macro village_start ან /cd სოფელი; /open კარი">
    </div>
  </div>

  <button class="send-btn" id="sendBtn" onclick="send()">გაგზავნა 🚀</button>
</div>

<hr class="divider">
<div class="my-title">📋 ჩემი შეტყობინებები</div>
<div class="notif-list" id="myList"><div class="empty">სახელი შეიყვანე</div></div>

<div id="toast"></div>

<script>
const SUPABASE_URL = "https://miqenmsgwkkmtxwwbxzo.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcWVubXNnd2trbXR4d3dieHpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDc0NzYsImV4cCI6MjA5NDg4MzQ3Nn0.VfJgVoPC-ZbjlcuwMriYrNXb-3E2OgC92nOR9hOPgKI";

const SYMBOLS = {
  info: "💬", warning: "⚠", danger: "❗",
  done: "✅", project: "🚀", consensus: "🗳️"
};

const HEADERS = {
  "Content-Type": "application/json",
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY
};

// send-push Edge Function checks the NEW publishable key format (sb_publishable_...),
// not the legacy anon JWT used everywhere else for REST calls — separate constant.
const SEND_PUSH_APIKEY = "sb_publishable_soE_2V-VW_fIu0DyM6QdzQ_TOvYNxF2";

// restore sender name
const savedName = localStorage.getItem("mdelo_sender");
if (savedName) {
  document.getElementById("sender").value = savedName;
  loadMyNotifs(savedName);
}

// type selection
let selType = null;
document.querySelectorAll(".type-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("sel"));
    btn.classList.add("sel");
    selType = btn.dataset.type;
    const hasVoting = ['consensus', 'project', 'done'].includes(selType);
    document.getElementById("consensusFields").style.display = hasVoting ? "flex" : "none";
    const labels = {
      consensus: ["კითხვა (talking circle)", "ვაშენებთ ხიდს დასავლეთ მინდორზე?"],
      project:   ["პროექტის სათაური",        "სარწყავი არხის პროექტი"],
      done:      ["დასრულებული პროექტი",      "სარწყავი არხი დასრულდა"],
    };
    const [lbl, ph] = labels[selType] || ["მთავარი ტექსტი", "კატის საჭმელი იწურება"];
    document.getElementById("textLabel").textContent = lbl;
    document.getElementById("text").placeholder = ph;
  };
});

function toast(msg, dur = 2500) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => t.style.display = "none", dur);
}

function onSenderChange() {
  const name = document.getElementById("sender").value.trim();
  if (name.length >= 2) loadMyNotifs(name);
}

async function loadMyNotifs(sender) {
  const list = document.getElementById("myList");
  if (!sender) { list.innerHTML = '<div class="empty">სახელი შეიყვანე</div>'; return; }
  try {
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/notifications?sender=eq." + encodeURIComponent(sender) + "&order=created_at.desc",
      { headers: HEADERS }
    );
    if (!res.ok) { list.innerHTML = '<div class="empty">ვერ ჩაიტვირთა</div>'; return; }
    const data = await res.json();
    if (!data.length) { list.innerHTML = '<div class="empty">შეტყობინებები არ გაქვს</div>'; return; }
    list.innerHTML = "";
    data.forEach(n => {
      const item = document.createElement("div");
      item.className = "notif-item";
      item.innerHTML = `
        <span class="notif-symbol">${n.symbol || "💬"}</span>
        <span class="notif-text">${n.text || ""}</span>
        <button class="notif-del" onclick="deleteNotif(${n.id}, this)">🗑</button>
      `;
      list.appendChild(item);
    });
  } catch(e) {
    list.innerHTML = '<div class="empty">კავშირის შეცდომა</div>';
  }
}

async function deleteNotif(id, btn) {
  btn.disabled = true; btn.textContent = "...";
  try {
    const res = await fetch(
      SUPABASE_URL + "/rest/v1/notifications?id=eq." + id,
      { method: "DELETE", headers: HEADERS }
    );
    if (res.ok) {
      btn.closest(".notif-item").remove();
      const list = document.getElementById("myList");
      if (!list.children.length) list.innerHTML = '<div class="empty">შეტყობინებები არ გაქვს</div>';
      toast("🗑 წაიშალა");
    } else {
      btn.disabled = false; btn.textContent = "🗑";
      toast("❌ ვერ წაიშალა");
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = "🗑";
    toast("❌ კავშირის შეცდომა");
  }
}

async function send() {
  const sender = document.getElementById("sender").value.trim();
  const text   = document.getElementById("text").value.trim();
  const detail = document.getElementById("detail").value.trim();
  const linked = document.getElementById("linked_area").value.trim();
  const hasVoting = ['consensus', 'project', 'done'].includes(selType);
  const deadlineRaw = document.getElementById("deadline").value;
  const quorumRaw   = document.getElementById("quorum_count").value;

  if (!sender) { toast("⚠ სახელი შეიყვანე"); return; }
  if (!selType) { toast("⚠ ტიპი აირჩიე"); return; }
  if (!text)    { toast("⚠ ტექსტი შეიყვანე"); return; }

  localStorage.setItem("mdelo_sender", sender);

  const btn = document.getElementById("sendBtn");
  btn.disabled = true; btn.textContent = "იგზავნება...";

  try {
    const body = {
      type:        selType,
      symbol:      SYMBOLS[selType],
      text:        text,
      detail:      detail || null,
      sender:      sender,
      linked_area: linked || ''
    };
    if (hasVoting) {
      body.deadline     = deadlineRaw ? new Date(deadlineRaw).toISOString() : null;
      body.quorum_count = quorumRaw ? parseInt(quorumRaw, 10) : null;
      const tcmd = document.getElementById("terminal_cmd").value.trim();
      if (tcmd) body.terminal_cmd = tcmd;
    }

    const res = await fetch(SUPABASE_URL + "/rest/v1/notifications", {
      method: "POST",
      headers: { ...HEADERS, "Prefer": "return=minimal" },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      toast("✅ გაიგზავნა!");
      // push-fetch (Scope C) — non-blocking, independent of the notifications insert above
      fetch(SUPABASE_URL + "/functions/v1/send-push", {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SEND_PUSH_APIKEY },
        body: JSON.stringify({
          map_id: "მდელო",
          title: "მდელო",
          body: sender + " — " + text,
          url: linked ? ("#area=" + encodeURIComponent(linked)) : "/"
        })
      }).catch(() => {});
      document.getElementById("text").value = "";
      document.getElementById("detail").value = "";
      document.getElementById("linked_area").value = "";
      document.getElementById("deadline").value = "";
      document.getElementById("quorum_count").value = "";
      document.getElementById("terminal_cmd").value = "";
      document.getElementById("consensusFields").style.display = "none";
      document.getElementById("textLabel").textContent = "მთავარი ტექსტი";
      document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("sel"));
      selType = null;
      loadMyNotifs(sender);
    } else {
      const err = await res.text();
      toast("❌ შეცდომა: " + err, 4000);
    }
  } catch(e) {
    toast("❌ კავშირის შეცდომა", 3000);
  }

  btn.disabled = false; btn.textContent = "გაგზავნა 🚀";
}
</script>
</body>
</html>
